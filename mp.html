<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario Party Stats</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 24px 16px; }
  .container { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 24px; }
  .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
  .filter-label { font-size: 13px; color: #888; }
  .chart-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .chart-nav-btn { background: #ebebea; border: none; border-radius: 6px; padding: 4px 12px; font-size: 16px; cursor: pointer; color: #555; transition: background 0.15s; }
  .chart-nav-btn:hover { background: #ddd; }
  .chart-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .chart-nav-label { font-size: 12px; color: #999; }
  .loading-msg { display: none; color: #888; font-size: 13px; padding: 20px 0; text-align: center; }
  .error-msg { display: none; background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; border-radius: 8px; padding: 10px 16px; font-size: 13px; margin-bottom: 16px; }
  .no-selection-msg { display: none; background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 500; margin-bottom: 16px; }
  .filter-btn { display: flex; align-items: center; gap: 8px; padding: 6px 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 14px; font-family: inherit; transition: opacity 0.15s, background 0.15s; }
  .filter-btn.active { background: #f0f0ee; border-color: #bbb; }
  .filter-btn:not(.active) { opacity: 0.4; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .check-icon { font-size: 13px; width: 14px; text-align: center; transition: opacity 0.15s; }
  .filter-btn.active .check-icon { opacity: 1; }
  .filter-btn:not(.active) .check-icon { opacity: 0; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 28px; }
  .metric-card { background: #ebebea; border-radius: 8px; padding: 14px; text-align: center; position: relative; }
  .metric-card.has-crown { padding-top: 20px; }
  .metric-crown { font-size: 18px; position: absolute; top: -13px; left: 50%; transform: translateX(-50%); line-height: 1; }
  .metric-record { font-size: 22px; font-weight: 500; letter-spacing: -0.5px; }
  .metric-ratio { font-size: 11px; color: #999; margin-top: 4px; }
  .metric-player { font-size: 12px; font-weight: 500; margin-bottom: 6px; }
  .section-title { font-size: 14px; font-weight: 500; color: #777; margin: 24px 0 12px; }
  .chart-wrap { position: relative; width: 100%; height: 260px; background: #fff; border-radius: 10px; border: 1px solid #e8e8e8; padding: 16px; }
  .pie-row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; background: #fff; border-radius: 10px; border: 1px solid #e8e8e8; padding: 16px; }
  .pie-wrap { position: relative; width: 160px; height: 160px; flex-shrink: 0; }
  .pie-legend { display: flex; flex-direction: column; gap: 8px; padding-top: 4px; font-size: 13px; }
  .table-card { background: #fff; border-radius: 10px; border: 1px solid #e8e8e8; overflow: hidden; margin-top: 4px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-weight: 500; font-size: 12px; color: #888; padding: 10px 12px; border-bottom: 1px solid #eee; background: #fafafa; }
  td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; color: #1a1a1a; }
  tr:last-child td { border-bottom: none; }
  .win-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 6px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e8e8e6; }
    .filter-btn { background: #2a2a2a; border-color: #444; color: #e8e8e6; }
    .filter-btn.active { background: #333; border-color: #555; }
    .metric-card { background: #252525; }
    .metric-ratio { color: #666; }
    .chart-wrap, .pie-row, .table-card { background: #242424; border-color: #333; }
    th { background: #2a2a2a; color: #aaa; border-bottom-color: #333; }
    td { border-bottom-color: #2e2e2e; color: #e8e8e6; }
    .filter-label, .section-title, .subtitle { color: #aaa; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🎲 Mario Party Stats</h1>
  <p class="subtitle">Theo · Miles · Griffen · Birdo — Inter Sport Sport League 2026</p>

  <div class="filters">
    <span class="filter-label">Filter players:</span>
    <button class="filter-btn active" id="btn-all" onclick="toggleAll()">
      All <span class="check-icon">&#10003;</span>
    </button>
    <button class="filter-btn" id="btn-theo" onclick="togglePlayer('theo')">
      <span class="dot" style="background:#378ADD;"></span> Theo <span class="check-icon">✓</span>
    </button>
    <button class="filter-btn" id="btn-miles" onclick="togglePlayer('miles')">
      <span class="dot" style="background:#D85A30;"></span> Miles <span class="check-icon">✓</span>
    </button>
    <button class="filter-btn" id="btn-griffen" onclick="togglePlayer('griffen')">
      <span class="dot" style="background:#1D9E75;"></span> Griffen <span class="check-icon">✓</span>
    </button>
    <button class="filter-btn" id="btn-birdo" onclick="togglePlayer('birdo')">
      <span class="dot" style="background:#E91E8C;"></span> Birdo <span class="check-icon">✓</span>
    </button>
  </div>

  <div class="loading-msg" id="loading-msg">Loading game data...</div>
  <div class="error-msg" id="error-msg"></div>
  <div class="no-selection-msg" id="no-selection-msg">&#9888; Select Players</div>
  <div class="metrics" id="metric-grid"></div>

  <p class="section-title">Total Wins Over Time</p>
  <div class="chart-wrap">
    <canvas id="winsChart" role="img" aria-label="Cumulative wins over time"></canvas>
  </div>

  <p class="section-title">Total Stars Over Time</p>
  <div class="chart-wrap">
    <canvas id="cumulChart" role="img" aria-label="Cumulative stars over time"></canvas>
  </div>

  <p class="section-title">Stars Per Game</p>
  <div class="chart-wrap">
    <canvas id="lineChart" role="img" aria-label="Line chart of stars scored per game"></canvas>
  </div>
  <div class="chart-nav">
    <button class="chart-nav-btn" id="ppg-prev" onclick="shiftPage(-1)" disabled>&#8592;</button>
    <span class="chart-nav-label" id="ppg-label"></span>
    <button class="chart-nav-btn" id="ppg-next" onclick="shiftPage(1)">&#8594;</button>
  </div>

  <p class="section-title" id="pie-title">Wins Breakdown</p>
  <div class="pie-row" id="pie-row">
    <div class="pie-wrap">
      <canvas id="pieChart" role="img" aria-label="Doughnut chart of wins by player"></canvas>
    </div>
    <div class="pie-legend" id="pie-legend"></div>
  </div>

  <p class="section-title">Game Log</p>
  <div class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Date</th>
            <th id="th-theo">Theo</th>
            <th id="th-miles">Miles</th>
            <th id="th-griffen">Griffen</th>
            <th id="th-birdo">Birdo</th>
            <th>Winner</th>
          </tr>
        </thead>
        <tbody id="game-table"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR-U-3trfgcf0EpbD9hK4LVzo2Vtz00rbXmHnn-mHyrWJb_R85GICLi9h8umatkvrWvI8WYSwqSuxlO/pub?gid=2090319849&single=true&output=csv';
const ALL_PLAYERS = ['theo','miles','griffen','birdo'];
let ALL_GAMES = [];

function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim() !== '');
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(v => v.trim());
    const get = (col) => {
      const i = headers.indexOf(col);
      return (i >= 0 && vals[i] !== undefined) ? vals[i] : '';
    };
    return {
      n:       parseInt(get('n')),
      date:    get('date'),
      theo:    get('theo')    !== '' ? parseInt(get('theo'))    : null,
      miles:   get('miles')   !== '' ? parseInt(get('miles'))   : null,
      griffen: get('griffen') !== '' ? parseInt(get('griffen')) : null,
      birdo:   get('birdo')   !== '' ? parseInt(get('birdo'))   : null,
      winner:  get('winner')
    };
  }).filter(g => !isNaN(g.n));
}

async function loadData() {
  const loadingEl = document.getElementById('loading-msg');
  const errorEl   = document.getElementById('error-msg');
  try {
    loadingEl.style.display = 'block';
    const res = await fetch(SHEET_CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    ALL_GAMES = parseCSV(text);
    loadingEl.style.display = 'none';
    render();
  } catch(e) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    errorEl.textContent = 'Could not load game data. Make sure the Google Sheet is shared publicly (Anyone with the link can view).';
    console.error('Failed to load sheet:', e);
  }
}

const COLORS = { theo:'#378ADD', miles:'#D85A30', griffen:'#1D9E75', birdo:'#E91E8C' };
const LIGHT  = { theo:'#B5D4F4', miles:'#F5C4B3', griffen:'#9FE1CB', birdo:'#F9B8DC' };

let allActive = true;
let active = { theo:false, miles:false, griffen:false, birdo:false };
let lineInst = null, cumulInst = null, winsInst = null, pieInst = null;
let ppgOffset = Infinity;
const PPG_PAGE = 10;

function toggleAll() {
  ppgOffset = Infinity;
  allActive = true;
  active = { theo:false, miles:false, griffen:false, birdo:false };
  document.getElementById('btn-all').classList.add('active');
  ALL_PLAYERS.forEach(p => document.getElementById('btn-'+p).classList.remove('active'));
  document.getElementById('no-selection-msg').style.display = 'none';
  render();
}

function togglePlayer(p) {
  if (allActive) {
    allActive = false;
    document.getElementById('btn-all').classList.remove('active');
  }
  ppgOffset = Infinity;
  active[p] = !active[p];
  document.getElementById('btn-'+p).classList.toggle('active', active[p]);
  const anyActive = ALL_PLAYERS.some(p => active[p]);
  document.getElementById('no-selection-msg').style.display = anyActive ? 'none' : 'block';
  render();
}

function getActivePlayers() {
  return allActive ? ALL_PLAYERS : ALL_PLAYERS.filter(p => active[p]);
}

function getGames() {
  if (allActive) return ALL_GAMES;
  const activePlayers = ALL_PLAYERS.filter(p => active[p]);
  if (activePlayers.length === 0) return [];
  if (activePlayers.length === 1) {
    const p = activePlayers[0];
    return ALL_GAMES.filter(g => g[p] !== null);
  }
  return ALL_GAMES.filter(g => {
    const gamePlayers = ALL_PLAYERS.filter(p => g[p] !== null);
    if (gamePlayers.length !== activePlayers.length) return false;
    return activePlayers.every(p => gamePlayers.includes(p));
  });
}

function render() {
  const games = getGames();
  const activePlayers = getActivePlayers();
  const solo = activePlayers.length === 1;
  renderMetrics(games, solo);
  renderWins(games, solo);
  renderCumul(games);
  renderLine(games);
  renderPie(games, solo);
  renderTable(games, solo);
  ALL_PLAYERS.forEach(p => {
    document.getElementById('th-'+p).style.display = (allActive || active[p] || solo) ? '' : 'none';
  });
}

function renderMetrics(games, solo) {
  const grid = document.getElementById('metric-grid');
  grid.innerHTML = '';
  const players = getActivePlayers();
  const stats = players.map(p => {
    const played = games.filter(g => g[p] !== null).length;
    const wins   = games.filter(g => g.winner === p).length;
    const losses = played - wins;
    const ratio  = played === 0 ? 0 : wins / played;
    const pts    = games.reduce((s,g) => s+(g[p]||0), 0);
    const avg    = played ? (pts/played).toFixed(1) : '0.0';
    return { p, wins, losses, ratio, played, avg };
  });
  const mostWins = solo ? -1 : Math.max(...stats.map(s => s.wins));
  stats.forEach(({ p, wins, losses, ratio, played, avg }) => {
    const isBest   = !solo && wins > 0 && wins === mostWins;
    const ratioStr = played === 0 ? '-' : ratio.toFixed(2);
    const c = document.createElement('div');
    c.className = 'metric-card' + (isBest ? ' has-crown' : '');
    c.innerHTML = `
      ${isBest ? '<div class="metric-crown">&#128081;</div>' : ''}
      <div class="metric-player" style="color:${COLORS[p]}">${p[0].toUpperCase()+p.slice(1)}</div>
      <div class="metric-record">${wins}W - ${losses}L</div>
      <div class="metric-ratio">${ratioStr} W/L &middot; ${avg} SPG</div>`;
    grid.appendChild(c);
  });
}

function buildDateGrouped(games, players, valueFn) {
  const dateMap = {};
  const dateOrder = [];
  games.forEach(g => {
    if (!dateMap[g.date]) {
      dateMap[g.date] = {};
      players.forEach(p => dateMap[g.date][p] = 0);
      dateOrder.push(g.date);
    }
    players.forEach(p => { dateMap[g.date][p] += valueFn(g, p); });
  });
  return { dateOrder, dateMap };
}

function renderWins(games, solo) {
  if (winsInst) { winsInst.destroy(); winsInst = null; }
  const ctx = document.getElementById('winsChart');
  const players = getActivePlayers();
  const sourceGames = solo ? ALL_GAMES.filter(g => g[players[0]] !== null) : games;
  const { dateOrder, dateMap } = buildDateGrouped(sourceGames, players, (g, p) => (g[p] !== null && g.winner === p) ? 1 : 0);
  const datasets = players.map(p => {
    let running = 0;
    const data = dateOrder.map(d => { running += dateMap[d][p]; return running; });
    return {
      label: p[0].toUpperCase()+p.slice(1),
      data,
      borderColor: COLORS[p], backgroundColor: LIGHT[p],
      pointBackgroundColor: COLORS[p],
      tension: 0.3, spanGaps: true, pointRadius: 3, borderWidth: 2, fill: false
    };
  });
  winsInst = new Chart(ctx, {
    type: 'line',
    data: { labels: dateOrder, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: {size:11}, autoSkip: true, maxTicksLimit: 12 }, grid: { color: 'rgba(128,128,128,0.1)' } },
        y: { ticks: { font: {size:11}, stepSize: 1 }, grid: { color: 'rgba(128,128,128,0.1)' }, beginAtZero: true }
      }
    }
  });
}

function shiftPage(dir) {
  const games = getGames();
  const maxOffset = Math.max(0, games.length - PPG_PAGE);
  ppgOffset = Math.min(maxOffset, Math.max(0, ppgOffset + dir * 2));
  renderLine(games);
}

function renderLine(games) {
  const ctx = document.getElementById('lineChart');
  if (lineInst) lineInst.destroy();
  const players = getActivePlayers();
  const maxOffset = Math.max(0, games.length - PPG_PAGE);
  ppgOffset = Math.min(ppgOffset, maxOffset);
  const page = games.slice(ppgOffset, ppgOffset + PPG_PAGE);
  document.getElementById('ppg-prev').disabled = ppgOffset === 0;
  document.getElementById('ppg-next').disabled = ppgOffset >= maxOffset;
  const end = Math.min(ppgOffset + PPG_PAGE, games.length);
  document.getElementById('ppg-label').textContent = games.length <= PPG_PAGE ? '' : `Games ${ppgOffset + 1}-${end} of ${games.length}`;
  lineInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels: page.map(g=>'#'+g.n),
      datasets: players.map(p=>({
        label: p[0].toUpperCase()+p.slice(1),
        data: page.map(g=>g[p]!=null?g[p]:null),
        borderColor: COLORS[p], backgroundColor: LIGHT[p],
        pointBackgroundColor: COLORS[p],
        tension:0.3, spanGaps:false, pointRadius:3, borderWidth:2
      }))
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:{ font:{size:11}, autoSkip:true, maxTicksLimit:12 }, grid:{ color:'rgba(128,128,128,0.1)' } },
        y:{ ticks:{ font:{size:11} }, grid:{ color:'rgba(128,128,128,0.1)' }, beginAtZero:true }
      }
    }
  });
}

function renderCumul(games) {
  if (cumulInst) { cumulInst.destroy(); cumulInst = null; }
  const ctx = document.getElementById('cumulChart');
  const players = getActivePlayers();
  const { dateOrder, dateMap } = buildDateGrouped(games, players, (g, p) => g[p] != null ? g[p] : 0);
  const datasets = players.map(p => {
    let running = 0;
    const data = dateOrder.map(d => { running += dateMap[d][p]; return running; });
    return {
      label: p[0].toUpperCase()+p.slice(1),
      data,
      borderColor: COLORS[p], backgroundColor: LIGHT[p],
      pointBackgroundColor: COLORS[p],
      tension: 0.3, spanGaps: true, pointRadius: 3, borderWidth: 2, fill: false
    };
  });
  cumulInst = new Chart(ctx, {
    type: 'line',
    data: { labels: dateOrder, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: {size:11}, autoSkip: true, maxTicksLimit: 12 }, grid: { color: 'rgba(128,128,128,0.1)' } },
        y: { ticks: { font: {size:11} }, grid: { color: 'rgba(128,128,128,0.1)' }, beginAtZero: true }
      }
    }
  });
}

function renderPie(games, solo) {
  const pieRow   = document.getElementById('pie-row');
  const pieTitle = document.getElementById('pie-title');
  if (solo) {
    pieRow.style.display = 'none';
    pieTitle.style.display = 'none';
    if (pieInst) { pieInst.destroy(); pieInst = null; }
    return;
  }
  pieRow.style.display = '';
  pieTitle.style.display = '';
  if (pieInst) { pieInst.destroy(); pieInst = null; }
  const ctx = document.getElementById('pieChart');
  const players = getActivePlayers();
  const wins = players.map(p=>games.filter(g=>g.winner===p).length);
  const total = wins.reduce((a,b)=>a+b,0);
  pieInst = new Chart(ctx, {
    type:'doughnut',
    data:{
      labels: players.map(p=>p[0].toUpperCase()+p.slice(1)),
      datasets:[{ data:wins, backgroundColor:players.map(p=>COLORS[p]), borderWidth:2, borderColor:'transparent' }]
    },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, cutout:'55%' }
  });
  document.getElementById('pie-legend').innerHTML = players.map((p,i)=>{
    const pct = total ? Math.round(wins[i]/total*100) : 0;
    return `<span style="display:flex;align-items:center;gap:6px;">
      <span style="width:10px;height:10px;border-radius:2px;background:${COLORS[p]};flex-shrink:0;"></span>
      <strong style="font-weight:500;">${p[0].toUpperCase()+p.slice(1)}</strong>: ${wins[i]} wins (${pct}%)
    </span>`;
  }).join('');
}

function renderTable(games, solo) {
  const tbody = document.getElementById('game-table');
  tbody.innerHTML = '';
  games.forEach(g => {
    const wName = g.winner ? g.winner[0].toUpperCase()+g.winner.slice(1) : '-';
    let cells = `<td style="color:#888">${g.n}</td><td>${g.date}</td>`;
    if (solo) {
      ALL_PLAYERS.forEach(p => {
        cells += `<td style="font-weight:${g.winner===p?'500':'400'};color:${g[p]===null?'#bbb':'inherit'}">${g[p]!==null?g[p]:'-'}</td>`;
      });
    } else {
      ALL_PLAYERS.forEach(p => {
        if (allActive || active[p]) {
          cells += `<td style="font-weight:${g.winner===p?'500':'400'};color:${g[p]==null?'#bbb':'inherit'}">${g[p]!=null?g[p]:'-'}</td>`;
        }
      });
    }
    cells += `<td><span class="win-badge" style="background:${LIGHT[g.winner]||'#eee'};color:${COLORS[g.winner]||'#888'};">${wName}</span></td>`;
    const row = document.createElement('tr');
    row.innerHTML = cells;
    tbody.appendChild(row);
  });
}

loadData();
</script>

</body>
</html>
