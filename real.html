<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theo's Sportsbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .live-pulse {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 0 rgba(239, 68, 68, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .nav-btn.active {
            border-bottom: 3px solid #3b82f6;
            color: #3b82f6;
        }

        /* --- Modern Team Palettes --- */
        .color-pistons { color: #C8102E; }
        .color-cavaliers { color: #860038; }
        .color-spurs { color: #C4CED4; }
        .color-thunder { color: #007AC1; }
        .color-timberwolves { color: #78BE20; }

        .bg-pistons { background-color: #1D428A; }
        .bg-cavaliers { background-color: #860038; }
        .bg-spurs { background-color: #000000; }
        .bg-thunder { background-color: #007AC1; }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .odds-btn.selected {
            background-color: #2563eb !important;
            border-color: #60a5fa !important;
            color: white !important;
        }

        .chart-container {
            height: 180px;
            width: 100%;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Loading Animation */
        .btn-loading {
            position: relative;
            color: transparent !important;
            pointer-events: none;
        }
        .btn-loading::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            margin: auto;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: btn-spin 0.6s linear infinite;
        }
        @keyframes btn-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Header -->
    <header class="p-4 md:p-6 bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <!-- Stack of bills (Cash icon) white outline style -->
                    <svg class="w-6 h-6 md:w-8 md:h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"></rect><circle cx="12" cy="12" r="2.5"></circle><path stroke-linecap="round" d="M6 10h1M17 14h1M4 18h16a2 2 0 0 0 2-2V9M6 20h14a2 2 0 0 0 2-2v-3"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-black tracking-tighter text-white">THEO'S <span class="text-blue-500">SPORTSBOOK</span></h1>
                    <div class="text-slate-400 text-[9px] md:text-[10px] font-bold uppercase tracking-widest" id="current-date-display">Updating Date...</div>
                </div>
            </div>
            
            <div class="flex items-center gap-2 md:gap-4 w-full md:w-auto justify-between md:justify-end">
                <div class="flex items-center gap-2 bg-slate-800 border border-slate-700 px-3 py-2 rounded-full shadow-lg transition-colors flex-1 md:flex-none">
                    <div onclick="showProfileModal()" class="flex items-center gap-3 cursor-pointer hover:text-blue-400">
                        <div class="bg-blue-500/20 p-1.5 rounded-full shrink-0">
                            <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        <div>
                            <span class="text-slate-400 text-[10px] font-bold uppercase block leading-none mb-1">Session</span>
                            <span class="text-white font-bold text-xs truncate max-w-[80px] sm:max-w-none" id="user-name-display">Guest</span>
                        </div>
                    </div>
                    <div id="delete-profile-btn" onclick="showDeleteModal()" class="hidden hover:bg-red-500/20 p-1.5 rounded-full cursor-pointer transition-all ml-1 border-l border-slate-700 pl-2">
                        <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </div>
                </div>

                <div class="bg-slate-800 border border-slate-700 px-4 py-2 rounded-full flex items-center gap-3 shadow-lg flex-1 md:flex-none">
                    <div class="bg-green-500/20 p-1.5 rounded-full shrink-0">
                        <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div>
                        <span class="text-slate-400 text-[10px] font-bold uppercase block leading-none mb-1">Balance</span>
                        <span class="text-white font-black text-xs md:text-sm" id="user-balance">$25.00</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Modals -->
    <div id="custom-modal" class="hidden fixed inset-0 z-[100] bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm md:max-w-md rounded-3xl p-6 md:p-8 border border-slate-700 space-y-6 max-h-[90vh] overflow-y-auto no-scrollbar">
            <div id="modal-content"></div>
            <div class="flex gap-3 pt-2" id="modal-actions">
                <button onclick="closeModal()" class="flex-1 py-3 bg-slate-800 rounded-xl font-bold text-xs uppercase tracking-widest text-slate-400">Cancel</button>
                <button id="modal-confirm-btn" class="flex-1 py-3 bg-blue-600 rounded-xl font-bold text-xs uppercase tracking-widest text-white">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Sync Overlay -->
    <div id="sync-overlay" class="hidden fixed inset-0 z-[110] bg-slate-950/80 backdrop-blur-md flex items-center justify-center">
        <div class="text-center space-y-4">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mx-auto"></div>
            <h3 class="text-lg font-bold tracking-tight text-white" id="sync-message">Syncing Database...</h3>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 md:p-6 space-y-8">
        <nav class="flex justify-between md:justify-start gap-4 md:gap-8 border-b border-slate-800 overflow-x-auto no-scrollbar whitespace-nowrap">
            <button onclick="switchTab('today')" id="tab-today" class="nav-btn active pb-4 font-semibold transition-all text-xs md:text-base px-1 md:px-0 text-slate-400">Schedule</button>
            <button onclick="switchTab('past')" id="tab-past" class="nav-btn pb-4 font-semibold transition-all text-xs md:text-base px-1 md:px-0 text-slate-400">Recent Results</button>
            <button onclick="switchTab('bets')" id="tab-bets" class="nav-btn pb-4 font-semibold transition-all text-xs md:text-base px-1 md:px-0 text-slate-400">Bets</button>
            <button onclick="switchTab('leaderboard')" id="tab-leaderboard" class="nav-btn pb-4 font-semibold transition-all text-xs md:text-base px-1 md:px-0 text-slate-400">Leaderboard</button>
        </nav>

        <!-- Contents -->
        <section id="section-today" class="tab-content space-y-6">
            <!-- Today's Games section (only shown if games are scheduled for today) -->
            <div id="today-games-section" class="space-y-4 hidden">
                <div class="flex items-center gap-2 mb-2">
                    <span class="live-pulse"></span>
                    <h2 class="text-xl font-bold text-white" id="today-games-title">Games for Today</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="today-schedule-list"></div>
            </div>
            
            <!-- Playoff / Upcoming Games section grouped by date headers -->
            <div id="upcoming-games-section" class="space-y-6">
                <div class="flex items-center gap-2 mb-2">
                    <h2 class="text-xl font-bold text-white" id="upcoming-section-header">Playoff Schedule</h2>
                </div>
                <div class="space-y-6" id="upcoming-schedule-list"></div>
            </div>
        </section>

        <!-- Recent Results -->
        <section id="section-past" class="tab-content hidden space-y-4">
            <h2 class="text-xl font-bold mb-4 text-white">Recent Playoff Results</h2>
            <div class="space-y-6" id="past-games-list"></div>
        </section>

        <section id="section-bets" class="tab-content hidden space-y-8">
            <div class="glass-card rounded-2xl p-4 md:p-5 border border-slate-800 relative">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest">This Week</h3>
                </div>
                <div id="chart-wrapper" class="chart-container relative"></div>
                
                <!-- Dynamic Hover/Touch Tooltip container -->
                <div id="chart-tooltip" class="absolute hidden bg-slate-950/95 backdrop-blur border border-blue-500 text-white font-bold text-[11px] px-3 py-2 rounded-xl shadow-2xl pointer-events-none transition-all duration-100 z-50"></div>

                <div class="flex justify-between mt-1.5 text-[9px] font-bold text-slate-600 uppercase tracking-tighter ml-[50px]">
                    <span>May 10</span><span>May 11</span><span>May 12</span><span>May 13</span><span>May 14</span><span>May 15</span><span>Today</span>
                </div>
            </div>
            <div>
                <div class="flex justify-between items-center mb-6 gap-4">
                    <div class="flex items-center gap-2">
                        <h2 class="text-xl font-bold text-white">Available Betting Lines</h2>
                        <div class="flex items-center bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 p-1.5 rounded-full" title="System Operational">
                            <svg class="w-3.5 h-3.5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    </div>
                    <!-- Odds format selector -->
                    <div class="flex bg-slate-800 p-0.5 rounded-lg border border-slate-700 text-[10px] font-bold">
                        <button onclick="changeOddsFormat('american')" id="btn-odds-american" class="px-2.5 py-1 rounded bg-blue-600 text-white transition-all">+/-</button>
                        <button onclick="changeOddsFormat('percent')" id="btn-odds-percent" class="px-2.5 py-1 rounded text-slate-400 transition-all">%</button>
                    </div>
                </div>
                <div class="space-y-6" id="betting-odds-list"></div>
            </div>
            <div class="pt-8 border-t border-slate-800">
                <h2 class="text-xl font-bold mb-6 text-white">Your Active Wagers</h2>
                <div id="active-bets-container" class="space-y-3"></div>
            </div>
            <div class="pt-8 border-t border-slate-800">
                <h2 class="text-xl font-bold mb-6 text-white">Win/Loss History</h2>
                <div id="bet-history-container" class="space-y-3"></div>
            </div>
        </section>

        <section id="section-leaderboard" class="tab-content hidden space-y-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white">Playoff Leaderboard</h2>
                <button onclick="fetchLeaderboard()" class="text-[10px] font-bold text-blue-400 uppercase tracking-widest hover:text-blue-300">Update Standings</button>
            </div>
            <div class="glass-card rounded-2xl overflow-hidden border border-slate-800">
                <div class="grid grid-cols-12 bg-slate-900/50 p-4 border-b border-slate-800 text-[10px] font-black uppercase text-slate-500 tracking-widest">
                    <div class="col-span-1">#</div>
                    <div class="col-span-7">User</div>
                    <div class="col-span-4 text-right">Balance</div>
                </div>
                <div id="leaderboard-list" class="divide-y divide-slate-800"></div>
            </div>
        </section>
    </main>

    <script>
        // --- FIREBASE CONFIGURATION ---
        const FIREBASE_DB_URL = "https://real-16bde-default-rtdb.firebaseio.com/";

        // --- GLOBAL STATE ---
        let balance = 25.00;
        let bets = [];
        let betHistory = []; 
        let balanceHistory = [25, 25, 25, 25, 25, 25, 25];
        let bustCount = 0; // Tracks player bankruptcies
        let userName = localStorage.getItem('nba_user_name') || 'Guest';
        let selections = {};
        let liveScheduleData = [];
        let leaderboardData = [];
        let profileExists = false;
        let oddsFormat = 'american'; // Tracks odds format option: 'american' or 'percent'

        // --- STATE RESET & LOCAL STORAGE SEPARATION ---
        function resetStateToDefault() {
            balance = 25.00;
            bets = [];
            betHistory = []; 
            balanceHistory = [25, 25, 25, 25, 25, 25, 25];
            bustCount = 0;
            selections = {};
        }

        function loadLocalState(name) {
            balance = parseFloat(localStorage.getItem(`nba_balance_${name}`)) || 25.00;
            bustCount = parseInt(localStorage.getItem(`nba_bustCount_${name}`)) || 0;
            
            try {
                bets = JSON.parse(localStorage.getItem(`nba_bets_${name}`)) || [];
            } catch(e) { bets = []; }
            
            try {
                betHistory = JSON.parse(localStorage.getItem(`nba_betHistory_${name}`)) || [];
            } catch(e) { betHistory = []; }
            
            try {
                balanceHistory = JSON.parse(localStorage.getItem(`nba_history_${name}`)) || [25, 25, 25, 25, 25, 25, 25];
            } catch(e) { balanceHistory = [25, 25, 25, 25, 25, 25, 25]; }
        }

        function saveLocalState(name) {
            localStorage.setItem(`nba_balance_${name}`, balance);
            localStorage.setItem(`nba_bustCount_${name}`, bustCount);
            localStorage.setItem(`nba_bets_${name}`, JSON.stringify(bets));
            localStorage.setItem(`nba_betHistory_${name}`, JSON.stringify(betHistory));
            localStorage.setItem(`nba_history_${name}`, JSON.stringify(balanceHistory));
        }

        // --- DATE RESOLVER & STANDARDIZER ---
        function formatGameDate(date, includeYear = false) {
            const weekdays = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const formatted = `${weekdays[date.getDay()]}, ${months[date.getMonth()]} ${date.getDate()}`;
            return includeYear ? `${formatted}, ${date.getFullYear()}` : formatted;
        }

        // --- INITIALIZATION ---
        async function init() {
            // Setup dynamic header date displays
            const todayDate = new Date();
            document.getElementById('current-date-display').innerText = formatGameDate(todayDate, true);
            document.getElementById('today-games-title').innerText = `Games for ${formatGameDate(todayDate)}`;

            renderPastGames();
            updateUserNameUI();
            
            // Clean up and load session state correctly by username
            resetStateToDefault();
            loadLocalState(userName);
            
            if (userName !== 'Guest') {
                await syncProfileFromServer(userName);
                document.getElementById('delete-profile-btn').classList.remove('hidden');
            } else {
                updateBalanceUI();
                renderActiveBets();
                renderBetHistory();
                renderBettingLines();
            }

            await fetchGameData();
        }

        // --- BANKRUPTCY & BAILOUT LOGIC ---
        function checkBankruptcy() {
            if (balance <= 0.005) {
                bustCount++;
                balance += 10.00;
                updateBalanceUI();
                
                // Trigger a prominent customized bankruptcy alert modal on-screen
                const modal = document.getElementById('custom-modal');
                const content = document.getElementById('modal-content');
                const actions = document.getElementById('modal-actions');
                
                actions.innerHTML = `<button onclick="closeModal()" class="w-full py-3 bg-red-600 hover:bg-red-700 rounded-xl font-bold text-xs uppercase tracking-widest text-white transition-colors">Accept $10 Bailout</button>`;
                content.innerHTML = `
                    <div class="text-center space-y-4">
                        <div class="text-5xl animate-bounce">❌</div>
                        <h3 class="text-xl font-black text-red-500 uppercase tracking-tight">Account Bankrupt!</h3>
                        <p class="text-slate-300 text-xs leading-relaxed">
                            Your balance hit $0.00! You have been granted a <strong class="text-green-400 font-extrabold">$10.00 Bailout Bonus</strong> to keep playing.
                        </p>
                        <div class="text-slate-400 text-[10px] uppercase font-black tracking-widest pt-1">
                            Your Penalty Marks: <span class="text-red-500 font-black">${"❌".repeat(bustCount)}</span> (${bustCount})
                        </div>
                    </div>`;
                
                modal.classList.remove('hidden');
            }
        }

        // --- MATH HELPERS ---
        function calculatePayoutAndProfit(amount, odds) {
            let profit = 0;
            if (odds > 0) {
                profit = amount * (odds / 100);
            } else if (odds < 0) {
                profit = amount * (100 / Math.abs(odds));
            } else {
                profit = 0;
            }
            return {
                profit: profit,
                payout: amount + profit
            };
        }

        // --- MATCHUP RESOLVER (SHOW TEAM BET AGAINST / MATCHUP CONTEXT) ---
        function getBetLabel(bet) {
            const game = liveScheduleData.find(g => g.id === parseInt(bet.gameId));
            const lineText = (bet.line !== undefined && bet.line !== null) ? (bet.line > 0 ? '+' : '') + bet.line.toFixed(1) : '';
            
            if (!game) {
                return `<span class="font-bold text-white">${bet.team} ${lineText}</span>`.trim();
            }
            
            if (bet.type === 'Total') {
                return `
                    <div class="flex flex-col">
                        <span class="font-bold text-white">${bet.team} ${lineText}</span>
                        <span class="text-slate-400 font-semibold text-[9px] uppercase tracking-wider">${game.away} @ ${game.home}</span>
                    </div>
                `;
            } else {
                const opponent = (bet.team === game.home) ? game.away : game.home;
                return `
                    <div class="flex flex-col">
                        <span class="font-bold text-white">${bet.team} ${lineText}</span>
                        <span class="text-slate-400 font-semibold text-[9px] uppercase tracking-wider">vs ${opponent}</span>
                    </div>
                `;
            }
        }

        // --- DATABASE SYNC LOGIC ---
        async function syncProfileFromServer(name) {
            if (!FIREBASE_DB_URL || FIREBASE_DB_URL.includes("PASTE_YOUR")) return;
            showOverlay(`Syncing Profile: ${name}...`);
            try {
                // Instantly scrub shared memory defaults & pre-load localized cached data of the target user
                resetStateToDefault();
                loadLocalState(name);

                const response = await fetch(`${FIREBASE_DB_URL}/users/${encodeURIComponent(name)}.json`);
                const profile = await response.json();
                
                if (profile) {
                    profileExists = true;
                    balance = parseFloat(profile.balance) || 25.00;
                    bustCount = parseInt(profile.bustCount) || 0; // Retrieve persistent bankruptcies
                    
                    if (profile.bets) {
                        bets = typeof profile.bets === 'string' ? JSON.parse(profile.bets) : profile.bets;
                    } else {
                        bets = [];
                    }
                    
                    if (profile.betHistory) {
                        betHistory = typeof profile.betHistory === 'string' ? JSON.parse(profile.betHistory) : profile.betHistory;
                    } else {
                        betHistory = [];
                    }
                    
                    if (profile.history) {
                        balanceHistory = typeof profile.history === 'string' ? JSON.parse(profile.history) : profile.history;
                    } else {
                        balanceHistory = [25, 25, 25, 25, 25, 25, 25];
                    }
                    saveLocalState(name);
                } else {
                    profileExists = false;
                    resetStateToDefault();
                    saveLocalState(name);
                    await saveProfileToServer();
                }
                userName = name;
                updateBalanceUI();
                updateUserNameUI();
                
                renderActiveBets();
                renderBetHistory();
                renderBettingLines();
                
                if (userName !== 'Guest') {
                    document.getElementById('delete-profile-btn').classList.remove('hidden');
                } else {
                    document.getElementById('delete-profile-btn').classList.add('hidden');
                }
            } catch (e) { console.error(e); }
            hideOverlay();
        }

        async function saveProfileToServer(btnElement = null) {
            saveLocalState(userName);
            if (userName === 'Guest' || !FIREBASE_DB_URL || FIREBASE_DB_URL.includes("PASTE_YOUR")) return;
            if (btnElement) btnElement.classList.add('btn-loading');
            try {
                const payload = {
                    name: userName,
                    balance: balance.toFixed(2),
                    bustCount: bustCount, // Save persistent bankruptcies
                    bets: JSON.stringify(bets),
                    betHistory: JSON.stringify(betHistory),
                    history: JSON.stringify(balanceHistory)
                };
                await fetch(`${FIREBASE_DB_URL}/users/${encodeURIComponent(userName)}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                profileExists = true;
            } catch (e) { console.error(e); }
            if (btnElement) btnElement.classList.remove('btn-loading');
        }

        async function deleteProfileFromServer() {
            if (userName === 'Guest') return;
            showOverlay("Purging Profile...");
            try {
                await fetch(`${FIREBASE_DB_URL}/users/${encodeURIComponent(userName)}.json`, { method: 'DELETE' });
                
                // Erase local persistent storage keys completely
                localStorage.removeItem(`nba_balance_${userName}`);
                localStorage.removeItem(`nba_bustCount_${userName}`);
                localStorage.removeItem(`nba_bets_${userName}`);
                localStorage.removeItem(`nba_betHistory_${userName}`);
                localStorage.removeItem(`nba_history_${userName}`);

                localStorage.removeItem('nba_user_name');
                location.reload();
            } catch (e) { console.error(e); hideOverlay(); }
        }

        async function fetchLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = `<div class="p-8 text-center"><div class="animate-spin h-5 w-5 border-2 border-blue-500 border-t-transparent rounded-full mx-auto"></div></div>`;
            try {
                const response = await fetch(`${FIREBASE_DB_URL}/users.json`);
                const data = await response.json();
                leaderboardData = data ? Object.values(data) : [];

        // --- BETTING LOGIC ---
        window.setBet = function(gameId, type, team, odds, line) { 
            const existingWager = selections[gameId]?.wager || '';
            selections[gameId] = { type, team, odds, line, wager: existingWager }; 
            renderBettingLines(); 
        };

        window.handleWagerChange = function(gameId, value) {
            if (!selections[gameId]) {
                selections[gameId] = { wager: value };
            } else {
                selections[gameId].wager = value;
            }
            updateBetPayoutDisplay(gameId);
        };

        window.updateBetPayoutDisplay = function(gameId) {
            const val = parseFloat(document.getElementById(`wager-${gameId}`).value);
            const displayEl = document.getElementById(`payout-display-${gameId}`);
            const sel = selections[gameId];
            if (!sel || !sel.odds || isNaN(val) || val <= 0) {
                if (displayEl) displayEl.innerHTML = '';
                return;
            }
            const { profit, payout } = calculatePayoutAndProfit(val, sel.odds);
            if (displayEl) {
                displayEl.innerHTML = `
                    <div class="flex justify-between w-full text-[10px] font-bold mt-2 px-1">
                        <span class="text-slate-400">Est. Profit: <strong class="text-blue-400">+$${profit.toFixed(2)}</strong></span>
                        <span class="text-slate-400">To Win: <strong class="text-green-400">$${payout.toFixed(2)}</strong></span>
                    </div>
                `;
            }
        };

        window.confirmPlaceBet = async function(gameId, btn) {
            const sel = selections[gameId]; if (!sel || sel.odds === undefined) return;
            const amt = parseFloat(document.getElementById(`wager-${gameId}`).value);
            if (isNaN(amt) || amt <= 0 || amt > balance) return;
            balance -= amt;
            
            // Check for bankruptcy before updating the server database and Redrawing balance charts
            checkBankruptcy();

            bets.push({ gameId, type: sel.type, team: sel.team, line: sel.line, amount: amt, originalOdds: sel.odds, time: new Date().toISOString() });
            updateBalanceUI(); await saveProfileToServer(btn);
            delete selections[gameId]; renderActiveBets(); renderBettingLines();
        };

        window.cashOutBet = async function(idx, value, btn) {
            if (!confirm(`Confirm Cash Out for $${value.toFixed(2)}?`)) return;
            balance += value; betHistory.unshift({ ...bets[idx], payout: value, closed: new Date().toISOString() });
            bets.splice(idx, 1); updateBalanceUI(); await saveProfileToServer(btn);
            renderActiveBets(); renderBetHistory(); renderBettingLines();
        };

                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-slate-400 font-bold uppercase">${g.time}</span>
                        <span class="text-xl font-black text-slate-700 tracking-widest italic">
                            <span class="${'color-'+g.away.toLowerCase()}">0</span>-<span class="${'color-'+g.home.toLowerCase()}">0</span>
                        </span>
                    </div>
                </div>`;

            // Handle Today's Games Section
            if (todayGames.length > 0) {
                todaySec.classList.remove('hidden');
                if (todayList) todayList.innerHTML = todayGames.map(cardHTML).join('');
                if (upcomingHeader) upcomingHeader.innerText = "Upcoming Games";
            } else {
                todaySec.classList.add('hidden');
                if (upcomingHeader) upcomingHeader.innerText = "Playoff Schedule";
            }

            // Group Upcoming Games by Day (like past results)
            if (upcomingList) {
                const groups = {};
                upcomingGames.forEach(g => {
                    if (!groups[g.date]) {
                        groups[g.date] = [];
                    }
                    groups[g.date].push(g);
                });

                let upcomingHTML = '';
                for (const date in groups) {
                    upcomingHTML += `
                    <div class="space-y-3">
                        <div class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-4 mb-2 border-b border-slate-800 pb-1">${date}</div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            ${groups[date].map(cardHTML).join('')}
                        </div>
                    </div>`;
                }
                upcomingList.innerHTML = upcomingHTML || `<div class="text-slate-500 text-xs italic text-center py-6">No upcoming games scheduled.</div>`;
            }
        }

        // --- HARDWARE TOOLTIP OVERLAY GRAPH LOGIC (TOUCH COMPATIBLE) ---
        window.showChartTooltip = function(e, val, dayIdx) {
            const tooltip = document.getElementById('chart-tooltip');
            if (!tooltip) return;
            const days = ['May 10', 'May 11', 'May 12', 'May 13', 'May 14', 'May 15', 'Today'];
            const dayLabel = days[dayIdx] || '';
            
            tooltip.innerHTML = `
                <div class="text-[9px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">${dayLabel}</div>
                <div class="text-xs text-blue-400 font-black">$${val.toFixed(2)}</div>
            `;
            tooltip.classList.remove('hidden');
            
            // Resolve correct viewport scaling on mobile zoom states
            const wrapper = document.getElementById('chart-wrapper');
            const rect = wrapper.getBoundingClientRect();
            
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            tooltip.style.left = `${x}px`;
            tooltip.style.top = `${y - 48}px`; // Shorter graph coordinates offset
            tooltip.style.transform = 'translateX(-50%)';
        };

        window.hideChartTooltip = function() {
            const tooltip = document.getElementById('chart-tooltip');
            if (tooltip) tooltip.classList.add('hidden');
        };

        // Tap-away dynamic dismiss handler for mobile
        document.addEventListener('click', function(e) {
            if (!e.target.closest('g') && !e.target.closest('#chart-tooltip')) {
                hideChartTooltip();
            }
        });
        document.addEventListener('touchstart', function(e) {
            if (!e.target.closest('g') && !e.target.closest('#chart-tooltip')) {
                hideChartTooltip();
            }
        }, { passive: true });

        window.switchTab = function(id) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            if (id === 'bets') { setTimeout(renderBalanceChart, 100); }
            if (id === 'leaderboard') fetchLeaderboard();
        };

        window.showProfileModal = function() {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            const actions = document.getElementById('modal-actions');
            actions.innerHTML = `<button onclick="closeModal()" class="flex-1 py-3 bg-slate-800 rounded-xl font-bold text-xs uppercase tracking-widest text-white">Cancel</button><button id="modal-confirm-btn" class="flex-1 py-3 bg-blue-600 rounded-xl font-bold text-xs uppercase tracking-widest text-white">Confirm</button>`;
            content.innerHTML = `<h3 class="text-xl font-bold text-center text-white">Sync Profile</h3><input type="text" id="name-input" placeholder="User Name" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 mt-4 text-sm text-white" value="${userName === 'Guest' ? '' : userName}">`;
            
            document.getElementById('modal-confirm-btn').onclick = async () => {
                const n = document.getElementById('name-input').value.trim();
                if (n) { 
                    userName = n; 
                    closeModal(); 
                    await syncProfileFromServer(n);
                }
            };
            modal.classList.remove('hidden');
        };

        window.showDeleteModal = function() {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            const actions = document.getElementById('modal-actions');
            actions.innerHTML = `<button onclick="closeModal()" class="flex-1 py-3 bg-slate-800 rounded-xl font-bold text-xs uppercase tracking-widest text-white">Cancel</button><button id="modal-confirm-btn" class="flex-1 py-3 bg-red-600 rounded-xl font-bold text-xs uppercase tracking-widest text-white">Delete</button>`;
            content.innerHTML = `<h3 class="text-xl font-bold text-red-500 text-center">Delete Profile?</h3><p class="text-slate-400 text-xs mt-2 text-center">Erase "${userName}" from cloud?</p>`;
            document.getElementById('modal-confirm-btn').onclick = deleteProfileFromServer;
            modal.classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('custom-modal').classList.add('hidden');
        function showOverlay(m) { document.getElementById('sync-overlay').classList.remove('hidden'); document.getElementById('sync-message').innerText = m; }
        function hideOverlay() { document.getElementById('sync-overlay').classList.add('hidden'); }

        function renderBalanceChart() {
            const wrapper = document.getElementById('chart-wrapper'); if (!wrapper) return;
            const w = wrapper.clientWidth; const h = 180; const padX = 50; const padY = 24;
            const maxVal = Math.max(...balanceHistory, 40) * 1.1;
            
            const points = balanceHistory.map((val, i) => {
                const px = padX + (i * ((w - padX) / 6));
                const py = h - padY - ((val / maxVal) * (h - 2 * padY));
                return {x: px, y: py, val: val};
            });

            const polyPoints = points.map(p => `${p.x},${p.y}`).join(' ');
            let svg = `<svg width="100%" height="100%" viewBox="0 0 ${w} ${h}">`;
            
            for(let i=0; i<=4; i++) {
                const yVal = (maxVal / 4) * i;
                const yPos = h - padY - ((yVal / maxVal) * (h - 2 * padY));
                svg += `<text x="5" y="${yPos + 4}" fill="#475569" font-size="9" font-weight="800">$${yVal.toFixed(0)}</text>`;
                svg += `<line x1="${padX}" y1="${yPos}" x2="${w}" y2="${yPos}" stroke="#334155" stroke-dasharray="4" />`;
            }

            svg += `<path d="M ${padX},${h-padY} L ${polyPoints} L ${w},${h-padY} Z" fill="#3b82f6" opacity="0.1" />`;
            svg += `<polyline fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="${polyPoints}" />`;
            
            points.forEach((p, idx) => {
                svg += `
                <g class="cursor-pointer" 
                   onmouseenter="showChartTooltip(event, ${p.val}, ${idx})"
                   onmousemove="showChartTooltip(event, ${p.val}, ${idx})"
                   onmouseleave="hideChartTooltip()"
                   ontouchstart="showChartTooltip(event, ${p.val}, ${idx})"
                   ontouchend="hideChartTooltip()">
                    <!-- Expanded touch & mouse tap bounding targets -->
                    <circle cx="${p.x}" cy="${p.y}" r="22" fill="transparent" class="pointer-events-auto" />
                    <!-- Visual indicator point markers -->
                    <circle cx="${p.x}" cy="${p.y}" r="5" fill="#3b82f6" stroke="#0f172a" stroke-width="2.5" />
                </g>`;
            });
            svg += `</svg>`;
            wrapper.innerHTML = svg;
        }

        function renderMiniChart(id, hist) {
            const wrapper = document.getElementById(id); if (!wrapper) return;
            const w = wrapper.clientWidth; const h = wrapper.clientHeight;
            const pad = 20; const maxVal = Math.max(...hist, 30) * 1.1;
            const points = hist.map((val, i) => ({x: i * (w / 6), y: h - pad - ((val / maxVal) * (h - 2 * pad)), val: val}));
            const polyPoints = points.map(p => `${p.x},${p.y}`).join(' ');
            let svg = `<svg width="100%" height="100%" viewBox="0 0 ${w} ${h}">`;
            svg += `<polyline fill="none" stroke="#3b82f6" stroke-width="2" points="${polyPoints}" />`;
            points.forEach(p => {
                svg += `<circle cx="${p.x}" cy="${p.y}" r="2" fill="#3b82f6" />`;
                svg += `<text x="${p.x}" y="${p.y - 6}" fill="#94a3b8" font-size="8" font-weight="700" text-anchor="middle">$${p.val.toFixed(0)}</text>`;
            });
            svg += `</svg>`;
            wrapper.innerHTML = svg;
        }

        window.onload = init;
    </script>
</body>
</html>
