<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Stats</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --text: #e8e8e8;
      --muted: #444;
      --accent: #c8ff00;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 100;
    }

    /* Horizontal rule lines across bg */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 39px,
        rgba(255,255,255,0.02) 39px,
        rgba(255,255,255,0.02) 40px
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: min(520px, 90vw);
    }

    .label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.4em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 0.1s;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 28px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 8vw, 64px);
      letter-spacing: 0.05em;
      text-decoration: none;
      text-align: center;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      transition: color 0.25s ease, border-color 0.25s ease;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    .btn:nth-child(2) { animation-delay: 0.25s; border-bottom: none; }
    .btn:nth-child(3) { animation-delay: 0.38s; border-bottom: none; }
    .btn:nth-child(4) { animation-delay: 0.51s; }

    /* Fill sweep on hover */
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.76, 0, 0.24, 1);
      z-index: 0;
    }

    .btn:hover::before {
      transform: scaleX(1);
    }

    .btn:hover {
      color: #0a0a0a;
      border-color: var(--accent);
    }

    .btn-inner {
      position: relative;
      z-index: 1;
      display: block;
      text-align: center;
    }

    .btn.assassin::before  { background: var(--accent); }
    .btn.mario::before     { background: #ff5fa0; }
    .btn.bball::before     { background: #ff6a1a; }

    .btn.mario:hover  { border-color: #ff5fa0; }
    .btn.bball:hover  { border-color: #ff6a1a; }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="label">Select Game</p>

    <a href="assassin.html" class="btn assassin">
      <span class="btn-inner">Assassin</span>
    </a>

    <a href="mp.html" class="btn mario">
      <span class="btn-inner">Mario Party</span>
    </a>

    <a href="bball.html" class="btn bball">
      <span class="btn-inner">Basketball</span>
    </a>
  </div>
</body>
</html>
