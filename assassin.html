<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔫 Assassin Stats</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a33;
    --text: #e8e6e0;
    --muted: #6a6a78;
    --accent: #f0c040;
    --theo: #4da6ff;
    --miles: #ff6b4a;
    --griffen: #3dcc8e;
    --jordan: #c97ef5;
    --ryann: #ff9fd2;
    --slade: #f5a623;
    --theo-dim: rgba(77,166,255,0.15);
    --miles-dim: rgba(255,107,74,0.15);
    --griffen-dim: rgba(61,204,142,0.15);
    --jordan-dim: rgba(201,126,245,0.15);
    --ryann-dim: rgba(255,159,210,0.15);
    --slade-dim: rgba(245,166,35,0.15);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 28px 16px 60px;
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 0%, rgba(240,192,64,0.04) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 100%, rgba(77,166,255,0.04) 0%, transparent 60%);
  }

  .container { max-width: 820px; margin: 0 auto; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; }
  .title-block { }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 3px; color: var(--accent); line-height: 1; }
  h1 span { color: var(--text); }
  .subtitle { font-size: 12px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; font-family: 'DM Mono', monospace; }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 28px; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

  /* Metric cards */
  .metrics { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-bottom: 32px; }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 12px 12px;
    text-align: center;
    position: relative;
    transition: border-color 0.2s;
  }
  .metric-card.crown { border-color: var(--accent); }
  .metric-crown { font-size: 16px; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); }
  .metric-player { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .metric-num { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 1px; line-height: 1; }
  .metric-label { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.5px; text-transform: uppercase; }
  .metric-sub { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

  /* Section titles */
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 28px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Chart */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    height: 250px;
    margin-bottom: 4px;
  }

  /* Assassinations log */
  .kills-log { display: flex; flex-direction: column; gap: 6px; }

  .kill-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: grid;
    grid-template-columns: 38px 1fr auto;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s;
    animation: fadeIn 0.3s ease both;
  }
  .kill-card:hover { border-color: #3a3a48; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .kill-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }

  .kill-visual {
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
    height: 56px;
  }

  .kill-svg { width: 100%; height: 56px; }

  .kill-score-block {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    min-width: 80px;
  }

  .kill-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }
  .kill-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    line-height: 1;
  }
  .kill-pts-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .kill-names {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-align: right;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  @media (max-width: 520px) {
    .kill-card {
      grid-template-columns: 28px 1fr;
      grid-template-rows: auto auto;
      gap: 6px 8px;
    }
    .kill-visual {
      grid-column: 1 / -1;
      height: 60px;
    }
    .kill-score-block {
      grid-column: 1 / -1;
      align-items: center;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px 10px;
      min-width: 0;
      text-align: center;
    }
    .kill-num {
      grid-row: 1;
      padding-top: 4px;
    }
    .kill-date { order: 1; }
    .kill-names { order: 2; text-align: center; }
    .kill-pts { order: 3; }
    .kill-pts-label { order: 4; align-self: center; }
  }

  /* Loading / error */
  .loading-msg { text-align: center; color: var(--muted); font-size: 13px; padding: 40px 0; display: none; font-family: 'DM Mono', monospace; letter-spacing: 1px; }
  .error-msg { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); color: #ff8080; border-radius: 8px; padding: 10px 16px; font-size: 13px; margin-bottom: 16px; display: none; }

  .chart-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; margin-bottom: 4px; }
  .chart-nav-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 14px; font-size: 14px; cursor: pointer; color: var(--text); transition: background 0.15s; }
  .chart-nav-btn:hover { background: #2a2a33; }
  .chart-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .chart-nav-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .no-data { text-align: center; color: var(--muted); padding: 30px; font-size: 13px; }

  /* Log expand button */
  .log-expand-wrap { display: flex; justify-content: center; margin-top: 6px; }
  .log-expand-btn {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 20px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    width: 100%;
  }
  .log-expand-btn:hover { border-color: #3a3a48; color: var(--text); }
  .log-expand-arrow { font-size: 14px; transition: transform 0.25s; }
  .log-expand-arrow.open { transform: rotate(180deg); }
  .kill-card.hidden { display: none; }
  .kill-card.revealed { animation: fadeIn 0.25s ease both; }


  /* Nav dropdown */
  .nav-menu { position: relative; }
  .nav-toggle {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: border-color 0.15s, color 0.15s;
  }
  .nav-toggle:hover { border-color: #3a3a48; color: var(--text); }
  .nav-toggle-arrow { font-size: 10px; transition: transform 0.2s; }
  .nav-toggle-arrow.open { transform: rotate(180deg); }
  .nav-dropdown {
    display: none; position: absolute; right: 0; top: calc(100% + 6px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; min-width: 150px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 100;
  }
  .nav-dropdown.open { display: block; }
  .nav-dropdown a {
    display: block; padding: 10px 16px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); text-decoration: none;
    transition: background 0.15s, color 0.15s;
  }
  .nav-dropdown a:hover { background: var(--surface2); color: var(--text); }
  .nav-dropdown a + a { border-top: 1px solid var(--border); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title-block">
      <h1><span>ASSASSIN</span></h1>
      <div class="subtitle">🔫 STATS FOR LIFE</div>
    </div>
    <div class="nav-menu">
      <button class="nav-toggle" onclick="toggleNav(this)">
        Menu <span class="nav-toggle-arrow">▾</span>
      </button>
      <div class="nav-dropdown" id="nav-dropdown">
        <a href="index.html">🏠 Home</a>
        <a href="https://docs.google.com/spreadsheets/d/1GN9FQlcL7AHvyefIPwTQKhdGa4m13GwSCazg_RJi0Xc/edit?usp=sharing" target="_blank" rel="noopener">✏️ Edit Data</a>
      </div>
    </div>
  </div>

  <div class="loading-msg" id="loading-msg">⏳ Loading assassination data...</div>
  <div class="error-msg" id="error-msg"></div>
  <div id="debug-panel" style="display:none;background:rgba(255,200,0,0.08);border:1px solid rgba(255,200,0,0.3);color:#f0c040;border-radius:8px;padding:10px 14px;font-size:11px;font-family:monospace;margin-bottom:16px;white-space:pre-wrap;line-height:1.6;"></div>

  <!-- Metric cards -->
  <div class="metrics" id="metric-grid"></div>

  <p class="section-title">Assassination Log</p>
  <div class="kills-log" id="kills-log"></div>
  <div class="log-expand-wrap" id="log-expand-wrap" style="display:none;">
    <button class="log-expand-btn" id="log-expand-btn" onclick="toggleLog()">
      <span id="log-expand-label">Show all</span>
      <span class="log-expand-arrow" id="log-expand-arrow">↓</span>
    </button>
  </div>

  <p class="section-title" style="margin-top:32px;">Total Assassinations Over Time</p>
  <div class="chart-wrap"><canvas id="killsChart"></canvas></div>

  <p class="section-title">Total Points Over Time</p>
  <div class="chart-wrap"><canvas id="ptsChart"></canvas></div>

  <!-- Legend -->
  <div class="legend" id="legend" style="margin-top:12px;"></div>
</div>

<script>
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRw2_kKxiLrrUOFMnM9nLPiaVrmWg5XNjAKEJi2PmE9Q_I4LFEuxb2dUmlPH9il2d36cBrdNBULQGl/pub?gid=0&single=true&output=csv';

const PLAYERS = ['theo','miles','griffen','jordan','ryann','slade'];
const COLORS = {
  theo: '#4da6ff', miles: '#ff6b4a', griffen: '#3dcc8e',
  jordan: '#c97ef5', ryann: '#ff9fd2', slade: '#f5a623'
};
const DIM = {
  theo: 'rgba(77,166,255,0.15)', miles: 'rgba(255,107,74,0.15)',
  griffen: 'rgba(61,204,142,0.15)', jordan: 'rgba(201,126,245,0.15)',
  ryann: 'rgba(255,159,210,0.15)', slade: 'rgba(245,166,35,0.15)'
};

let ALL_KILLS = [];
let killsChartInst = null, ptsChartInst = null;

function cap(s) { return s ? s[0].toUpperCase() + s.slice(1) : ''; }

function splitCSVLine(line) {
  const vals = [];
  let cur = '', inQ = false;
  for (let c of line.replace(/\r/g, '')) {
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { vals.push(cur); cur = ''; }
    else cur += c;
  }
  vals.push(cur);
  return vals.map(v => v.trim());
}

function parseCSV(text) {
  // Strip BOM, normalize line endings
  const clean = text.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
  const lines = clean.split('\n').filter(l => l.trim());

  const headers = splitCSVLine(lines[0]).map(h => h.toLowerCase().replace(/"/g, '').trim());
  console.log('[Assassin] CSV headers:', headers);

  const get = (vals, col) => {
    const i = headers.indexOf(col);
    return (i >= 0 && vals[i] !== undefined) ? vals[i].trim() : '';
  };

  // The sheet has columns: n, date, target, distance, bonus points, theo, miles, griffen, ...
  // Whichever player column has a value on a row is the assassin.
  // That value is their base kill point. bonus points is added on top.

  const rows = lines.slice(1).map(line => {
    const vals = splitCSVLine(line);

    const n = parseInt(get(vals, 'n'));
    if (isNaN(n)) return null;

    const date     = get(vals, 'date');
    const target   = get(vals, 'target').toLowerCase().trim();
    const dist     = parseFloat(get(vals, 'distance')) || 5;
    const distClamped = Math.max(1, Math.min(5, dist));

    // Bonus points column
    const bonusRaw = get(vals, 'bonus points');
    const bonus = bonusRaw !== '' && !isNaN(parseFloat(bonusRaw)) ? parseFloat(bonusRaw) : 0;

    // Find which player column has a value — that player is the assassin
    // Their column value is their kill point (e.g. 1), bonus is added on top
    let assassin = '';
    let killPt = 0;
    for (const p of PLAYERS) {
      const raw = get(vals, p);
      if (raw !== '') {
        const v = parseFloat(raw);
        if (!isNaN(v)) {
          assassin = p;
          killPt = v;
          break;
        }
      }
    }

    if (!assassin) return null; // no player had a value, skip row

    const total_pts = killPt + bonus;

    const t = get(vals, 't');
    return { n, date, assassin, target, distance: distClamped, bonus, killPt, total_pts, t };
  }).filter(Boolean);

  console.log('[Assassin] Parsed', rows.length, 'rows. Sample:', rows.slice(0,3));

  // Debug panel — hide it now that logic is correct, but keep for transparency
  const panel = document.getElementById('debug-panel');
  if (panel) {
    panel.textContent = 'Headers: ' + headers.join(', ') + '\nRows: ' + rows.length + (rows[0] ? '\nSample: ' + JSON.stringify(rows[0]) : '');
    panel.style.display = 'none'; // hidden unless you need to debug
  }

  return rows;
}

async function loadData() {
  const loadEl = document.getElementById('loading-msg');
  const errEl = document.getElementById('error-msg');
  loadEl.style.display = 'block';
  try {
    const res = await fetch(SHEET_CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    ALL_KILLS = parseCSV(text);
    loadEl.style.display = 'none';
    render();
  } catch(e) {
    loadEl.style.display = 'none';
    errEl.style.display = 'block';
    errEl.textContent = 'Could not load data. Make sure the Google Sheet is published publicly as CSV.';
    console.error(e);
  }
}

function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = PLAYERS.map(p => `
    <div class="legend-item">
      <span class="legend-dot" style="background:${COLORS[p]}"></span>
      <span>${cap(p)}</span>
    </div>`).join('');
}


function buildMetrics() {
  const grid = document.getElementById('metric-grid');
  grid.innerHTML = '';

  const stats = PLAYERS.map(p => {
    const kills = ALL_KILLS.filter(k => k.assassin === p).length;
    const pts = ALL_KILLS.filter(k => k.assassin === p).reduce((s,k) => s + k.total_pts, 0);
    const deaths = ALL_KILLS.filter(k => k.target === p).length;
    return { p, kills, pts, deaths };
  });

  // Sort: most pts → most kills → alphabetical
  stats.sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (b.kills !== a.kills) return b.kills - a.kills;
    return a.p.localeCompare(b.p);
  });

  const maxPts = stats[0]?.pts ?? 0;

  stats.forEach(({ p, kills, pts, deaths }) => {
    const isBest = pts > 0 && pts === maxPts;
    const c = document.createElement('div');
    c.className = 'metric-card' + (isBest ? ' crown' : '');
    c.innerHTML = `
      ${isBest ? '<div class="metric-crown">🎯</div>' : ''}
      <div class="metric-player" style="color:${COLORS[p]}">${cap(p)}</div>
      <div class="metric-num" style="color:${COLORS[p]}">${pts}</div>
      <div class="metric-label">Total Points</div>
      <div class="metric-sub">${kills} K · ${deaths} D</div>
    `;
    grid.appendChild(c);
  });
}

function buildCharts() {
  // Build chronological data
  const sorted = [...ALL_KILLS].sort((a,b) => a.n - b.n);

  // Group by date for x-axis
  const dates = [...new Set(sorted.map(k => k.date))];

  // Cumulative kills per player over dates
  const killsData = {};
  const ptsData = {};
  PLAYERS.forEach(p => { killsData[p] = []; ptsData[p] = []; });

  const runKills = {};
  const runPts = {};
  PLAYERS.forEach(p => { runKills[p] = 0; runPts[p] = 0; });

  dates.forEach(d => {
    const dayKills = sorted.filter(k => k.date === d);
    PLAYERS.forEach(p => {
      runKills[p] += dayKills.filter(k => k.assassin === p).length;
      runPts[p] += dayKills.filter(k => k.assassin === p).reduce((s,k) => s + k.total_pts, 0);
      killsData[p].push(runKills[p]);
      ptsData[p].push(runPts[p]);
    });
  });

  const commonOpts = (isPoints) => ({
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#6a6a78', font: { size: 10, family: 'DM Mono' }, autoSkip: true, maxTicksLimit: 10 }, grid: { color: 'rgba(255,255,255,0.05)' } },
      y: { ticks: { color: '#6a6a78', font: { size: 10 }, ...(isPoints ? {} : { stepSize: 1 }) }, grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true }
    }
  });

  const mkDatasets = (dataMap) => PLAYERS.map(p => ({
    label: cap(p), data: dataMap[p],
    borderColor: COLORS[p], backgroundColor: DIM[p],
    pointBackgroundColor: COLORS[p],
    tension: 0.35, pointRadius: 3, borderWidth: 2, fill: false, spanGaps: true
  }));

  if (killsChartInst) killsChartInst.destroy();
  killsChartInst = new Chart(document.getElementById('killsChart'), {
    type: 'line',
    data: { labels: dates, datasets: mkDatasets(killsData) },
    options: { ...commonOpts(false) }
  });

  if (ptsChartInst) ptsChartInst.destroy();
  ptsChartInst = new Chart(document.getElementById('ptsChart'), {
    type: 'line',
    data: { labels: dates, datasets: mkDatasets(ptsData) },
    options: { ...commonOpts(true) }
  });
}

function drawKillSVG(container, assassin, target, distance, label) {
  // distance 1-5 → visual spread
  const W = container.clientWidth || 300;
  const labelH = label ? 18 : 0;
  const H = 56 + labelH;
  const minSep = 30;
  const maxSep = W - 60;
  const sep = minSep + ((distance - 1) / 4) * (maxSep - minSep);

  const cx = W / 2;
  const shooterX = cx - sep / 2;
  const targetX = cx + sep / 2;
  const groundY = H - 8;

  const aColor = COLORS[assassin] || '#fff';
  const tColor = COLORS[target] || '#888';

  // Arc control point: higher arc for longer distance
  const arcH = 10 + (distance / 5) * 28;
  const cpY = groundY - arcH;
  const midX = (shooterX + targetX) / 2;

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // Label text above the graphic
  if (label) {
    const svgNS2 = 'http://www.w3.org/2000/svg';
    const labelEl = document.createElementNS(svgNS2, 'text');
    labelEl.setAttribute('x', W / 2);
    labelEl.setAttribute('y', 13);
    labelEl.setAttribute('text-anchor', 'middle');
    labelEl.setAttribute('font-size', '11');
    labelEl.setAttribute('font-family', 'DM Sans, sans-serif');
    labelEl.setAttribute('font-style', 'italic');
    labelEl.setAttribute('fill', 'rgba(150,150,165,0.9)');
    labelEl.textContent = label;
    svg.appendChild(labelEl);
  }

  // Arc path (water stream)
  const path = document.createElementNS(svgNS, 'path');
  path.setAttribute('d', `M ${shooterX} ${groundY - 10} Q ${midX} ${cpY} ${targetX} ${groundY - 10}`);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', aColor);
  path.setAttribute('stroke-width', '2');
  path.setAttribute('stroke-dasharray', '4 3');
  path.setAttribute('opacity', '0.7');
  svg.appendChild(path);

  // Water gun emoji (shooter)
  const gunText = document.createElementNS(svgNS, 'text');
  gunText.setAttribute('x', -shooterX);
  gunText.setAttribute('y', groundY);
  gunText.setAttribute('text-anchor', 'middle');
  gunText.setAttribute('font-size', '18');
  gunText.setAttribute('transform', 'scale(-1,1)');
  gunText.textContent = '🔫';
  svg.appendChild(gunText);

  // Stick figure (target) — simple SVG
  // head
  const head = document.createElementNS(svgNS, 'circle');
  head.setAttribute('cx', targetX);
  head.setAttribute('cy', groundY - 18);
  head.setAttribute('r', '5');
  head.setAttribute('fill', 'none');
  head.setAttribute('stroke', tColor);
  head.setAttribute('stroke-width', '1.5');
  svg.appendChild(head);

  // body
  const body = document.createElementNS(svgNS, 'line');
  body.setAttribute('x1', targetX); body.setAttribute('y1', groundY - 13);
  body.setAttribute('x2', targetX); body.setAttribute('y2', groundY - 4);
  body.setAttribute('stroke', tColor); body.setAttribute('stroke-width', '1.5');
  svg.appendChild(body);

  // arms
  const armL = document.createElementNS(svgNS, 'line');
  armL.setAttribute('x1', targetX - 6); armL.setAttribute('y1', groundY - 10);
  armL.setAttribute('x2', targetX); armL.setAttribute('y2', groundY - 7);
  armL.setAttribute('stroke', tColor); armL.setAttribute('stroke-width', '1.5');
  svg.appendChild(armL);
  const armR = document.createElementNS(svgNS, 'line');
  armR.setAttribute('x1', targetX + 6); armR.setAttribute('y1', groundY - 10);
  armR.setAttribute('x2', targetX); armR.setAttribute('y2', groundY - 7);
  armR.setAttribute('stroke', tColor); armR.setAttribute('stroke-width', '1.5');
  svg.appendChild(armR);

  // legs
  const legL = document.createElementNS(svgNS, 'line');
  legL.setAttribute('x1', targetX - 5); legL.setAttribute('y1', groundY);
  legL.setAttribute('x2', targetX); legL.setAttribute('y2', groundY - 4);
  legL.setAttribute('stroke', tColor); legL.setAttribute('stroke-width', '1.5');
  svg.appendChild(legL);
  const legR = document.createElementNS(svgNS, 'line');
  legR.setAttribute('x1', targetX + 5); legR.setAttribute('y1', groundY);
  legR.setAttribute('x2', targetX); legR.setAttribute('y2', groundY - 4);
  legR.setAttribute('stroke', tColor); legR.setAttribute('stroke-width', '1.5');
  svg.appendChild(legR);

  // splash at target
  const splash = document.createElementNS(svgNS, 'text');
  splash.setAttribute('x', targetX + 10);
  splash.setAttribute('y', groundY - 14);
  splash.setAttribute('font-size', '12');
  splash.setAttribute('opacity', '0.8');
  splash.textContent = '💦';
  svg.appendChild(splash);

  container.appendChild(svg);
}

let logExpanded = false;

function buildLog() {
  const log = document.getElementById('kills-log');
  const expandWrap = document.getElementById('log-expand-wrap');
  log.innerHTML = '';
  logExpanded = false;

  if (!ALL_KILLS.length) {
    log.innerHTML = '<div class="no-data">No assassinations recorded yet.</div>';
    if (expandWrap) expandWrap.style.display = 'none';
    return;
  }

  const sorted = [...ALL_KILLS].sort((a,b) => b.n - a.n);
  const PREVIEW = 3;

  sorted.forEach((k, i) => {
    const card = document.createElement('div');
    const isHidden = i >= PREVIEW;
    card.className = 'kill-card' + (isHidden ? ' hidden' : '');
    card.dataset.idx = i;
    card.style.animationDelay = Math.min(i, 20) * 0.03 + 's';

    const aColor = COLORS[k.assassin] || '#fff';
    const tColor = COLORS[k.target] || '#888';

    card.innerHTML = `
      <div class="kill-num">#${k.n}</div>
      <div class="kill-visual" id="kv-${k.n}"></div>
      <div class="kill-score-block">
        <div class="kill-date">${k.date}</div>
        <div class="kill-pts" style="color:${aColor}">${k.total_pts}</div>
        <div class="kill-pts-label">pts${k.bonus > 0 ? ` (+${k.bonus})` : ''}</div>
        <div class="kill-names">
          <span style="color:${aColor}">${cap(k.assassin)}</span>
          <span style="color:var(--muted)"> → </span>
          <span style="color:${tColor}">${cap(k.target)}</span>
        </div>
      </div>
    `;

    log.appendChild(card);
  });

  // Show expand button only if there are more than PREVIEW entries
  if (expandWrap) {
    expandWrap.style.display = sorted.length > PREVIEW ? 'flex' : 'none';
  }
  updateExpandBtn();

  // Draw SVGs for visible cards immediately
  requestAnimationFrame(() => {
    sorted.slice(0, PREVIEW).forEach(k => {
      const container = document.getElementById('kv-' + k.n);
      if (container) drawKillSVG(container, k.assassin, k.target, k.distance, k.t);
    });
  });
}

function toggleLog() {
  logExpanded = !logExpanded;
  const hidden = document.querySelectorAll('.kill-card.hidden, .kill-card.revealed');
  const svgsNeeded = [];

  hidden.forEach(card => {
    const idx = parseInt(card.dataset.idx);
    if (logExpanded) {
      card.classList.remove('hidden');
      card.classList.add('revealed');
      // Find which kill this card corresponds to and draw SVG if not already drawn
      const kvId = card.querySelector('[id^="kv-"]')?.id;
      if (kvId) {
        const container = document.getElementById(kvId);
        if (container && container.children.length === 0) svgsNeeded.push(kvId);
      }
    } else {
      if (idx >= 3) {
        card.classList.add('hidden');
        card.classList.remove('revealed');
      }
    }
  });

  if (svgsNeeded.length > 0) {
    const sorted = [...ALL_KILLS].sort((a,b) => b.n - a.n);
    requestAnimationFrame(() => {
      sorted.forEach(k => {
        const container = document.getElementById('kv-' + k.n);
        if (container && container.children.length === 0) {
          drawKillSVG(container, k.assassin, k.target, k.distance, k.t);
        }
      });
    });
  }

  updateExpandBtn();
}

function updateExpandBtn() {
  const label = document.getElementById('log-expand-label');
  const arrow = document.getElementById('log-expand-arrow');
  const sorted = [...ALL_KILLS].sort((a,b) => b.n - a.n);
  const remaining = sorted.length - 3;
  if (label) label.textContent = logExpanded ? 'Show less' : `Show all ${sorted.length} assassinations`;
  if (arrow) arrow.classList.toggle('open', logExpanded);
}

function render() {
  buildLegend();
  buildMetrics();
  buildCharts();
  buildLog();
}

function toggleNav(btn) {
  const dropdown = document.getElementById('nav-dropdown');
  const arrow = btn.querySelector('.nav-toggle-arrow');
  const isOpen = dropdown.classList.toggle('open');
  arrow.classList.toggle('open', isOpen);
  if (isOpen) {
    const close = (e) => { if (!btn.closest('.nav-menu').contains(e.target)) { dropdown.classList.remove('open'); arrow.classList.remove('open'); document.removeEventListener('click', close); } };
    setTimeout(() => document.addEventListener('click', close), 0);
  }
}

loadData();
</script>
