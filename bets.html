<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BET LEDGER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0c0e10;
    --surface: #13161a;
    --surface2: #1a1e24;
    --border: #252a32;
    --green: #00e676;
    --red: #ff4444;
    --purple: #b57bee;
    --muted: #5a6370;
    --text: #e8eaed;
    --text2: #9aa0ab;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { background: #0c0e10; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
  }

  /* ─── HEADER ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    background: linear-gradient(90deg, var(--purple), #fff 70%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #edit-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-decoration: none;
    flex-shrink: 0;
    transition: color .2s, border-color .2s, background .2s;
  }
  #edit-link:hover { color: var(--purple); border-color: var(--purple); background: var(--surface); }

  /* ─── MAIN ─── */
  main { padding: 16px; max-width: 1200px; margin: 0 auto; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .neutral  { color: var(--text2); }

  /* ─── PENDING ─── */
  #pending-section { margin-bottom: 20px; }
  #pending-cards { display: flex; gap: 12px; flex-wrap: wrap; }

  .pending-card {
    background: var(--surface);
    border: 1px solid var(--purple);
    border-radius: 10px;
    padding: 14px 16px 22px;
    flex: 1 1 240px;
    min-width: 200px;
    max-width: 100%;
    position: relative;
    animation: fadeIn .4s ease both;
  }

  .pending-card::after {
    content: 'PENDING';
    position: absolute;
    bottom: 6px; right: 10px;
    color: var(--purple);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    opacity: 0.5;
  }

  .pending-card .matchup {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    line-height: 1.15;
    margin-bottom: 8px;
    color: var(--text);
  }
  .pending-card .matchup .hl { color: var(--purple); }

  .pending-card .meta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text2);
  }
  .pending-card .meta strong { color: var(--text); }
  .pending-card .wlabel { color: var(--red); }

  .pending-card .potential {
    margin-top: 8px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
  }

  #no-pending {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    padding: 10px 0;
  }

  /* ─── BALANCE ─── */
  #balance-section {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 12px;
    margin-bottom: 20px;
    align-items: stretch;
  }

  .balance-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .balance-card .lbl {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .balance-card .amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    line-height: 1;
    letter-spacing: 2px;
  }

  .balance-card .change {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    margin-top: 8px;
    line-height: 1.7;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    min-width: 0;
    overflow: hidden;
  }

  .chart-card canvas { display: block; width: 100% !important; max-width: 100%; height: 160px !important; }

  /* ─── ANALYTICS ─── */
  #analytics-section {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 12px;
    margin-bottom: 20px;
    align-items: start;
  }

  .venn-card, .stats-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 16px;
  }

  .venn-card h3 {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  #donut-wrap { display: flex; justify-content: center; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-tile {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }

  .stat-tile .st-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  .stat-tile .st-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    line-height: 1;
    word-break: break-word;
  }

  .stat-tile .st-sub {
    font-size: 10px;
    color: var(--text2);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
    line-height: 1.4;
    word-break: break-word;
  }

  /* ─── BET LOG ─── */
  #log-section { margin-bottom: 40px; }

  .table-scroll { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }

  #log-table {
    width: 100%;
    min-width: 340px;
    border-collapse: collapse;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  #log-table thead tr { border-bottom: 1px solid var(--border); }

  #log-table th {
    text-align: left;
    padding: 8px 8px;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 500;
    white-space: nowrap;
  }

  #log-table tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  #log-table tbody tr:hover { background: var(--surface2); }
  #log-table td { padding: 10px 8px; color: var(--text2); vertical-align: middle; }
  #log-table td.team-col { color: var(--text); font-weight: 500; }

  .expand-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    gap: 8px;
    margin-top: 12px;
    padding: 10px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
  }
  .expand-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--muted); }
  .expand-btn svg { transition: transform .3s; }
  .expand-btn.open svg { transform: rotate(180deg); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    header { padding: 12px 14px; }
    header h1 { font-size: 26px; }
    main { padding: 12px; }

    #balance-section { grid-template-columns: 1fr; }
    .balance-card { text-align: center; align-items: center; }
    .balance-card .amount { font-size: 48px; }

    #analytics-section { grid-template-columns: 1fr; }
    #donut-wrap canvas { width: 200px !important; height: 200px !important; }

    .pending-card { flex: 1 1 100%; }

    #log-table { font-size: 11px; }
    #log-table th, #log-table td { padding: 7px 5px; }
  }

  @media (min-width: 601px) and (max-width: 860px) {
    #balance-section { grid-template-columns: 160px 1fr; }
    #analytics-section { grid-template-columns: 220px 1fr; }
    #donut-wrap canvas { width: 180px !important; height: 180px !important; }
  }

  /* ─── CHART RANGE BUTTONS ─── */
  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .chart-header .section-label { margin-bottom: 0; white-space: nowrap; }
  .range-btns { display: flex; gap: 4px; }
  .range-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 7px;
    cursor: pointer;
    transition: all .15s;
    line-height: 1;
  }
  .range-btn:hover { color: var(--text); border-color: var(--muted); }
  .range-btn.active { background: var(--surface2); color: var(--purple); border-color: var(--purple); }
  /* ─── SORTABLE HEADERS ─── */
  th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
  th.sortable:hover { color: var(--text2); }
  th.sortable .sort-icon { margin-left: 3px; opacity: 0.4; font-size: 9px; }
  th.sortable.asc .sort-icon::after { content: '▲'; opacity: 1; color: var(--purple); }
  th.sortable.desc .sort-icon::after { content: '▼'; opacity: 1; color: var(--purple); }
  th.sortable:not(.asc):not(.desc) .sort-icon::after { content: '⇅'; }
</style>
</head>
<body>

<header>
  <h1>BET LEDGER</h1>
  <a id="edit-link" href="https://docs.google.com/spreadsheets/d/116R5t_XmOuYj5Z8cGr0fwcB9fYCpZzEBNZahPtEYMIQ/edit?usp=drive_link" target="_blank" title="Edit spreadsheet" aria-label="Edit spreadsheet">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
  </a>
</header>

<main>
  <section id="pending-section">
    <div class="section-label">⬤ Pending Bets</div>
    <div id="pending-cards"><p id="no-pending" style="display:none">No pending bets.</p></div>
  </section>

  <section id="balance-section">
    <div class="balance-card">
      <div class="lbl">Total Balance</div>
      <div class="amount" id="balance-amount">—</div>
      <div class="change" id="balance-change"></div>
    </div>
    <div class="chart-card">
      <div class="chart-header">
        <div class="section-label">Balance Over Time</div>
        <div class="range-btns">
          <button class="range-btn active" data-range="1W">1W</button>
          <button class="range-btn" data-range="1M">1M</button>
          <button class="range-btn" data-range="All">All</button>
        </div>
      </div>
      <canvas id="balance-chart" style="height:160px;width:100%;display:block;"></canvas>
    </div>
  </section>

  <section id="analytics-section">
    <div class="venn-card">
      <h3>Prediction Win Rate</h3>
      <div id="donut-wrap">
        <canvas id="donut-chart" width="220" height="220"></canvas>
      </div>
      <div id="donut-legend" style="text-align:center;margin-top:10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2)"></div>
    </div>
    <div class="stats-card">
      <div class="section-label" style="margin-bottom:14px">Performance Stats</div>
      <div class="stats-grid" id="stats-grid"></div>
    </div>
  </section>

  <section id="log-section">
    <div class="section-label">Bet Log</div>
    <div class="table-scroll">
      <table id="log-table">
        <thead>
          <tr>
            <th>Team</th>
            <th>vs</th>
            <th class="sortable" id="th-wager" onclick="sortLog('wager')">Wager<span class="sort-icon"></span></th>
            <th class="sortable" id="th-pct" onclick="sortLog('pct')">%<span class="sort-icon"></span></th>
            <th class="sortable" id="th-payout" onclick="sortLog('payout')">Payout<span class="sort-icon"></span></th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
    </div>
    <button class="expand-btn" id="expand-btn" onclick="toggleExpand()">
      <span id="expand-label">Show All Bets</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcqC9jKaHG8zOS_2-szgNmDE-RaPdrF6M_pfnLWudIe8fuauDeWfKza8DyEdgam_-V2kgrpGdn7R9T/pub?gid=0&single=true&output=csv";

let allCompletedBets = [];
let showAll = false;
let _logSortCol = null;   // 'wager' | 'pct' | 'payout' | null
let _logSortDir = 0;      // 0=original, 1=desc, -1=asc
let _logOriginal = [];    // original chronological order
let balanceChart = null;
let _allChartLabels = [];
let _allChartPoints = [];

function _parseDateInt(s) {
  if (!s || s === 'Start') return null;
  const p = String(s).trim().split('/');
  if (p.length < 3) return null;
  let [m, d, y] = p.map(Number);
  if (y < 100) y += 2000;
  return (isNaN(m)||isNaN(d)||isNaN(y)) ? null : y*10000+m*100+d;
}

function setChartRange(range) {
  document.querySelectorAll('.range-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.range === range));
  _drawChart(range);
}

function _drawChart(range) {
  if (!_allChartLabels.length) return;
  // Find the most recent real bet date in the dataset (skip 'Start' and nulls)
  let latestDateInt = 0;
  for (let i = 0; i < _allChartLabels.length; i++) {
    const di = _parseDateInt(_allChartLabels[i]);
    if (di !== null && di > latestDateInt) latestDateInt = di;
  }
  // Build a real Date from latestDateInt for arithmetic
  const latestY = Math.floor(latestDateInt / 10000);
  const latestM = Math.floor((latestDateInt % 10000) / 100) - 1; // 0-indexed
  const latestD = latestDateInt % 100;
  const latestDate = new Date(latestY, latestM, latestD);
  let cutoff = 0;
  if (range === '1W') {
    const d = new Date(latestDate); d.setDate(latestDate.getDate()-7);
    cutoff = d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  } else if (range === '1M') {
    const d = new Date(latestDate); d.setMonth(latestDate.getMonth()-1);
    cutoff = d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  }
  // Find the earliest real date in the dataset to use for 'Start' comparisons
  let firstRealDateInt = Infinity;
  for (let i = 0; i < _allChartLabels.length; i++) {
    const di = _parseDateInt(_allChartLabels[i]);
    if (di !== null && di < firstRealDateInt) firstRealDateInt = di;
  }
  let fl = [], fp = [];
  for (let i = 0; i < _allChartLabels.length; i++) {
    const di = _parseDateInt(_allChartLabels[i]);
    // 'Start' uses the earliest real date for range comparison
    const effectiveDi = (di === null) ? firstRealDateInt : di;
    if (range === 'All' || effectiveDi >= cutoff) {
      fl.push(_allChartLabels[i]); fp.push(_allChartPoints[i]);
    }
  }
  // Sort chronologically; 'Start' (di=null) always sorts first
  const paired = fl.map((l, i) => ({ l, p: fp[i], di: _parseDateInt(l) }));
  paired.sort((a, b) => (a.di === null ? -1 : b.di === null ? 1 : a.di - b.di));
  fl = paired.map(x => x.l); fp = paired.map(x => x.p);
  if (!fl.length) { fl = _allChartLabels.slice(); fp = _allChartPoints.slice(); }
  const isUp = fp[fp.length-1] >= fp[0];
  const ctx = document.getElementById('balance-chart').getContext('2d');
  if (balanceChart) balanceChart.destroy();
  const grad = ctx.createLinearGradient(0,0,0,160);
  grad.addColorStop(0, isUp?'rgba(0,230,118,0.22)':'rgba(255,68,68,0.22)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  balanceChart = new Chart(ctx, {
    type:'line',
    data:{ labels:fl, datasets:[{ data:fp, borderColor:isUp?'#00e676':'#ff4444',
      backgroundColor:grad, borderWidth:2, pointRadius:fp.length>20?0:3,
      pointBackgroundColor:isUp?'#00e676':'#ff4444', fill:true, tension:0.35 }] },
    options:{ responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{ legend:{display:false}, tooltip:{ backgroundColor:'#1a1e24',
        borderColor:'#252a32', borderWidth:1, titleColor:'#9aa0ab', bodyColor:'#e8eaed',
        padding:8, caretSize:5,
        callbacks:{ label:c=>`$${c.parsed.y.toFixed(2)}` } }},
      scales:{
        x:{ grid:{color:'#1a1e24'}, ticks:{color:'#5a6370', font:{family:'DM Mono',size:9}, maxRotation:30, autoSkip:true, maxTicksLimit:8} },
        y:{ grid:{color:'#1a1e24'}, ticks:{color:'#5a6370', font:{family:'DM Mono',size:9}, callback:v=>`$${v}`}, border:{dash:[4,4]} }
      }}
  });
}
let donutChart = null;

function parseMoney(v) {
  if (!v) return null;
  const n = parseFloat(String(v).replace(/[$,\s]/g, ''));
  return isNaN(n) ? null : n;
}

function isPending(row) {
  const h = String(row[7] || '').trim().toLowerCase();
  return h === 'pending' || h === '';
}

function loadData() {
  Papa.parse(CSV_URL, {
    download: true,
    skipEmptyLines: true,
    complete(results) {
      const dataRows = results.data.filter((r, i) => {
        if (i === 0) return false;
        return r[3] && r[3].trim() !== '' && parseMoney(r[5]) !== null;
      });
      renderPending(dataRows);
      renderBalance(dataRows);
      renderAnalytics(dataRows);
      renderLog(dataRows);
    },
    error(err) {
      console.error('CSV error:', err);
      document.getElementById('pending-cards').innerHTML =
        '<p style="font-family:\'DM Mono\',monospace;font-size:12px;color:var(--red);padding:10px 0">⚠ Could not load data.</p>';
    }
  });
}

/* ─── PENDING ─── */
function renderPending(rows) {
  const container = document.getElementById('pending-cards');
  const noPending = document.getElementById('no-pending');
  const pending = rows.filter(isPending);
  if (pending.length === 0) { noPending.style.display = 'block'; return; }

  pending.forEach((r, idx) => {
    const team = r[3] || '?';
    const opp  = String(r[4] || '').trim();
    const amt  = parseMoney(r[5]);
    const oddsRaw = String(r[6] || '').replace(/%/g, '').trim();
    const theoretical = parseMoney(r[8]);
    const bet = String(r[2] || '').trim();
    const isChampionship = !opp || /championship/i.test(opp);
    const betLabel = /ml/i.test(bet) ? 'Win' : bet;
    const badge = (!isChampionship && betLabel)
      ? ` <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${betLabel}</span>`
      : '';
    const matchupHTML = isChampionship
      ? `<span class="hl">${team}</span> Championship 🏆`
      : `<span class="hl">${team}</span> vs ${opp}${badge}`;

    const card = document.createElement('div');
    card.className = 'pending-card';
    card.style.animationDelay = `${idx * 0.08}s`;
    card.innerHTML = `
      <div class="matchup">${matchupHTML}</div>
      <div class="meta">
        <div><span class="wlabel">Wager:</span> <strong>$${amt ? amt.toFixed(2) : '—'}</strong></div>
        <div>Odds: <strong>${oddsRaw ? oddsRaw + '%' : '—'}</strong></div>
      </div>
      ${theoretical ? `<div class="potential">Potential: <span style="color:var(--text)">$${theoretical.toFixed(2)}</span> <span style="color:var(--green)">(+$${(theoretical-(amt||0)).toFixed(2)})</span></div>` : ''}
    `;
    container.appendChild(card);
  });
}

/* ─── BALANCE + CHART ─── */
function renderBalance(rows) {
  const START = 25;
  const completed = rows.filter(r => !isPending(r));
  const pending   = rows.filter(r => isPending(r));

  // Parse "M/D/YY" or "M/D/YYYY" → integer YYYYMMDD for sorting/comparing
  function parseDate(s) {
    if (!s) return null;
    const parts = String(s).trim().split('/');
    if (parts.length < 3) return null;
    let [m, d, y] = parts.map(Number);
    if (y < 100) y += 2000;
    if (isNaN(m) || isNaN(d) || isNaN(y)) return null;
    return y * 10000 + m * 100 + d;
  }

  // ── Collect all unique dates (completed + pending) and sort them ──
  const allDatesSet = new Set();
  completed.forEach(r => { const d = String(r[1]||'').trim(); if (d) allDatesSet.add(d); });
  pending.forEach(r   => { const d = String(r[1]||'').trim(); if (d) allDatesSet.add(d); });

  const allDates = Array.from(allDatesSet).sort((a, b) => {
    const da = parseDate(a), db = parseDate(b);
    if (da === null && db === null) return 0;
    if (da === null) return 1;
    if (db === null) return -1;
    return da - db;
  });

  // ── Net completed profit per date ──
  const completedProfitByDate = new Map();
  completed.forEach(r => {
    const date = String(r[1]||'').trim();
    if (!date) return;
    const profit = (parseMoney(r[7])||0) - (parseMoney(r[5])||0);
    completedProfitByDate.set(date, (completedProfitByDate.get(date)||0) + profit);
  });

  // ── Total pending wager per date ──
  const pendingWagerByDate = new Map();
  pending.forEach(r => {
    const date = String(r[1]||'').trim();
    if (!date) return;
    const w = parseMoney(r[5]) || 0;
    pendingWagerByDate.set(date, (pendingWagerByDate.get(date)||0) + w);
  });

  // ── Total pending wagers (for display balance) ──
  const totalPendingOut = pending.reduce((s,r) => s+(parseMoney(r[5])||0), 0);

  // ── Build chart: one point per date, running completed balance minus cumulative pending deductions ──
  // Pending wagers placed on a date reduce the balance from that date onward (money is out of pocket)
  let runningCompleted = START;
  let cumulativePendingDeducted = 0; // pending wagers placed on/before this date
  const points = [START];
  const labels = ['Start'];
  // Map dateStr -> index in points array (for delta lookups)
  const pointIndexByDate = new Map();

  allDates.forEach(dateStr => {
    // Apply completed profit for this date
    const profit = completedProfitByDate.get(dateStr) || 0;
    runningCompleted = parseFloat((runningCompleted + profit).toFixed(2));

    // Apply pending wagers placed on this date
    const pendingOnDate = pendingWagerByDate.get(dateStr) || 0;
    cumulativePendingDeducted = parseFloat((cumulativePendingDeducted + pendingOnDate).toFixed(2));

    // Liquid balance = completed running - all pending wagers placed so far
    const liquidBalance = parseFloat((runningCompleted - cumulativePendingDeducted).toFixed(2));

    points.push(liquidBalance);
    labels.push(dateStr);
    pointIndexByDate.set(dateStr, points.length - 1);
  });

  // ── Displayed balance number = latest point value ──
  const balance = points[points.length - 1];
  const isUp = balance >= START;

  const amtEl = document.getElementById('balance-amount');
  amtEl.textContent = `$${balance.toFixed(2)}`;
  amtEl.className = 'amount ' + (isUp ? 'positive' : 'negative');

  const pct = (((balance - START) / START) * 100);
  const pctStr = `${pct >= 0 ? '+' : ''}${pct.toFixed(1)}%`;

  // ── Deltas: read directly from the graph points array ──
  const now = new Date();

  function graphBalanceNDaysAgo(n) {
    const target = new Date(now);
    target.setDate(now.getDate() - n);
    const targetInt = target.getFullYear() * 10000 + (target.getMonth()+1) * 100 + target.getDate();
    // Walk labels (skip index 0 = 'Start'), find most recent point <= targetInt
    let best = null, bestDi = -1;
    for (let i = 1; i < labels.length; i++) {
      const di = parseDate(labels[i]);
      if (di !== null && di <= targetInt && di > bestDi) {
        bestDi = di;
        best = points[i];
      }
    }
    return best !== null ? best : START;
  }

  const balYest  = graphBalanceNDaysAgo(1);
  const balWeek  = graphBalanceNDaysAgo(7);
  const deltaYest = parseFloat((balance - balYest).toFixed(2));
  const deltaWeek = parseFloat((balance - balWeek).toFixed(2));

  function deltaLabel(delta, period) {
    if (delta > 0)  return { text: `▲ +$${delta.toFixed(2)} ${period}`, cls: 'positive' };
    if (delta < 0)  return { text: `▼ -$${Math.abs(delta).toFixed(2)} ${period}`, cls: 'negative' };
    return { text: `— $0.00 ${period}`, cls: '' };
  }

  const dY = deltaLabel(deltaYest, 'yesterday');
  const dW = deltaLabel(deltaWeek, 'last week');
  document.getElementById('balance-change').innerHTML =
    `<span class="${isUp?'positive':'negative'}">${pctStr} from start</span><br>` +
    `<span class="${dY.cls}" style="font-size:10px">${dY.text}</span><br>` +
    `<span class="${dW.cls}" style="font-size:10px">${dW.text}</span>`;

  // ── Store full data, wire buttons, draw default 1W ──
  _allChartLabels = labels.slice();
  _allChartPoints = points.slice();
  document.querySelectorAll('.range-btn').forEach(btn =>
    btn.addEventListener('click', () => setChartRange(btn.dataset.range)));
  _drawChart('1W');
}

/* ─── DONUT + STATS ─── */
function renderAnalytics(rows) {
  const completed = rows.filter(r => !isPending(r));
  const wins = completed.filter(r => (parseMoney(r[7])||0) > 0);
  const losses = completed.filter(r => (parseMoney(r[7])||0) === 0);
  const total = completed.length, winCount = wins.length, lossCount = losses.length;
  const winPct = total > 0 ? (winCount/total)*100 : 0;

  const ctx = document.getElementById('donut-chart').getContext('2d');
  if (donutChart) donutChart.destroy();
  donutChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels:['Wins','Losses'], datasets:[{ data:[winCount||0,lossCount||0],
      backgroundColor:['rgba(0,230,118,0.85)','rgba(255,68,68,0.5)'],
      borderColor:['#00e676','#ff4444'], borderWidth:2, hoverOffset:6 }] },
    options: { cutout:'72%', responsive:false, plugins:{ legend:{display:false},
      tooltip:{ backgroundColor:'#1a1e24', borderColor:'#252a32', borderWidth:1, bodyColor:'#e8eaed',
        callbacks:{ label:c=>` ${c.label}: ${c.parsed} (${total>0?((c.parsed/total)*100).toFixed(1):0}%)` }
      }}},
    plugins:[{ id:'centerText', afterDraw(chart) {
      const {ctx, chartArea:{top,bottom,left,right}} = chart;
      const cx=(left+right)/2, cy=(top+bottom)/2;
      ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font='bold 32px "Bebas Neue",sans-serif';
      ctx.fillStyle = winPct>=50?'#00e676':'#ff4444';
      ctx.fillText(`${winPct.toFixed(1)}%`,cx,cy-9);
      ctx.font='10px "DM Mono",monospace'; ctx.fillStyle='#9aa0ab';
      ctx.fillText('WIN RATE',cx,cy+14); ctx.restore();
    }}]
  });
  document.getElementById('donut-legend').textContent = `${winCount} wins · ${lossCount} losses · ${total} total`;

  const spreads = completed.filter(r=>/[+-]\d/.test(String(r[2]||'')));
  const spreadWins = spreads.filter(r=>(parseMoney(r[7])||0)>0);
  const spreadPct = spreads.length>0 ? ((spreadWins.length/spreads.length)*100).toFixed(1) : null;

  const mls = completed.filter(r=>/ml/i.test(String(r[2]||'')));
  const mlWins = mls.filter(r=>(parseMoney(r[7])||0)>0);
  const mlPct = mls.length>0 ? ((mlWins.length/mls.length)*100).toFixed(1) : null;

  let bestP=null,bestR=null, bigL=null,bigLR=null, bigW=0,bigWR=null;
  completed.forEach(r => {
    const w=parseMoney(r[5])||0, p=parseMoney(r[7])||0, profit=p-w;
    if(profit>0&&(bestP===null||profit>bestP)){bestP=profit;bestR=r;}
    if(profit<0&&(bigL===null||profit<bigL)){bigL=profit;bigLR=r;}
    if(w>bigW){bigW=w;bigWR=r;}
  });

  // Sub: date · team · bet type/spread · odds%
  function sub(r) {
    if(!r) return '';
    const date = String(r[1]||'').trim();
    const team = (r[3]||'').trim();
    const betRaw = String(r[2]||'').trim();
    const betLabel = /ml/i.test(betRaw) ? 'Win' : (/[+-]\d/.test(betRaw) ? betRaw : '');
    const oddsRaw = String(r[6]||'').replace(/%/g,'').trim();
    const odds = oddsRaw ? oddsRaw+'%' : '';
    return [date, team, betLabel, odds].filter(Boolean).join(' · ');
  }

  // Win streaks: longest and current
  const ordered = completed.slice().sort((a,b)=>(parseFloat(a[0])||0)-(parseFloat(b[0])||0));
  let longest=0, curStreak=0;
  ordered.forEach(r=>{
    if((parseMoney(r[7])||0)>0){curStreak++;if(curStreak>longest)longest=curStreak;}else curStreak=0;
  });
  // curStreak is now the current active streak at end of sorted list

  // Most bet team — count bets and wins
  const tBets={}, tWins={};
  completed.forEach(r=>{
    const t=(r[3]||'').trim();
    if(t){
      tBets[t]=(tBets[t]||0)+1;
      if((parseMoney(r[7])||0)>0) tWins[t]=(tWins[t]||0)+1;
    }
  });
  const topTeam=Object.entries(tBets).sort((a,b)=>b[1]-a[1])[0];
  const topTeamWins = topTeam ? (tWins[topTeam[0]]||0) : 0;
  const topTeamSub = topTeam ? `${topTeam[1]} bets · ${topTeamWins}W / ${topTeam[1]-topTeamWins}L` : '';

  const lwPayout=bigWR?(parseMoney(bigWR[7])||0):0;
  const lwWon=lwPayout>0;

  const tiles=[
    {label:'Current Streak 🔥', val:String(curStreak), sub:'active win streak', cls:curStreak>0?'positive':'neutral'},
    {label:'Longest Streak 🏆', val:String(longest), sub:'all time best', cls:longest>0?'positive':''},
    {label:'Spread Win %', val:spreadPct!==null?`${spreadPct}%`:'—', sub:`${spreadWins.length}/${spreads.length} bets`, cls:spreadPct!==null&&parseFloat(spreadPct)>=50?'positive':'negative'},
    {label:'ML Win %', val:mlPct!==null?`${mlPct}%`:'—', sub:`${mlWins.length}/${mls.length} bets`, cls:mlPct!==null&&parseFloat(mlPct)>=50?'positive':'negative'},
    {label:'Best Profit', val:bestP!==null?`+$${bestP.toFixed(2)}`:'—', sub:sub(bestR), cls:'positive'},
    {label:'Biggest Loss', val:bigL!==null?`-$${Math.abs(bigL).toFixed(2)}`:'—', sub:sub(bigLR), cls:'negative'},
    {label:'Largest Wager', val:`$${bigW.toFixed(2)}`, sub:`${lwWon?'✓ Won':'✗ Lost'} · ${sub(bigWR)}`, cls:lwWon?'positive':'negative'},
    {label:'Most Bet Team', val:topTeam?topTeam[0]:'—', sub:topTeamSub, cls:''},
  ];

  const grid=document.getElementById('stats-grid');
  grid.innerHTML='';
  tiles.forEach(t=>{
    const d=document.createElement('div');
    d.className='stat-tile';
    d.innerHTML=`<div class="st-label">${t.label}</div><div class="st-val ${t.cls}">${t.val}</div><div class="st-sub">${t.sub}</div>`;
    grid.appendChild(d);
  });
}

/* ─── LOG ─── */
function renderLog(rows) {
  allCompletedBets = rows.filter(r=>!isPending(r)).slice()
    .sort((a,b)=>(parseFloat(b[0])||0)-(parseFloat(a[0])||0));
  _logOriginal = allCompletedBets.slice();
  _logSortCol = null; _logSortDir = 0;
  renderLogRows();
}

function renderLogRows() {
  const tbody=document.getElementById('log-body');
  tbody.innerHTML='';
  allCompletedBets.forEach((r,i)=>{ if(!showAll&&i>=5)return; appendRow(tbody,r); });
  const btn=document.getElementById('expand-btn');
  const lbl=document.getElementById('expand-label');
  if(allCompletedBets.length<=5){btn.style.display='none';return;}
  btn.style.display='flex';
  lbl.textContent=showAll?'Show Less':`Show All ${allCompletedBets.length} Bets`;
  btn.className='expand-btn'+(showAll?' open':'');
}

function appendRow(tbody,r) {
  const team=r[3]||'—', opp=r[4]||'—';
  const bet=String(r[2]||'').trim();
  const bLabel=/ml/i.test(bet)?'Win':bet;
  const wager=parseMoney(r[5]);
  const oddsRaw=String(r[6]||'').replace(/%/g,'').trim();
  const odds=oddsRaw?`${oddsRaw}%`:'—';
  const payout=parseMoney(r[7]);
  const isLoss=payout!==null&&payout===0;
  const profit=(payout!==null&&wager!==null)?payout-wager:null;

  const payoutHTML=payout!==null
    ?(isLoss?`<span style="color:var(--red)">$0.00</span>`:`<span style="color:var(--green)">$${payout.toFixed(2)}</span>`)
    :'—';
  const profitHTML=profit!==null
    ?(profit>0?`<span style="color:var(--green)">+$${profit.toFixed(2)}</span>`:`<span style="color:var(--red)">-$${Math.abs(profit).toFixed(2)}</span>`)
    :'—';
  const teamHTML=bLabel
    ?`${team} <span style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace">${bLabel}</span>`
    :team;

  // Payout cell: total on top, profit below, always stacked
  const payoutCell = `
    <div style="display:flex;flex-direction:column;line-height:1.4;">
      <span>${payoutHTML}</span>
      <span style="font-size:10px;color:var(--muted)">(${profitHTML})</span>
    </div>`;

  const tr=document.createElement('tr');
  if(isLoss)tr.style.opacity='0.65';
  tr.innerHTML=`
    <td class="team-col" style="${isLoss?'color:var(--red)':''}">${teamHTML}</td>
    <td>${opp}</td>
    <td>$${wager!==null?wager.toFixed(2):'—'}</td>
    <td>${odds}</td>
    <td>${payoutCell}</td>
  `;
  tbody.appendChild(tr);
}

function sortLog(col) {
  const cols = ['wager', 'pct', 'payout'];
  // Cycle: if same col -> advance dir (1 -> -1 -> 0); if new col -> start at 1
  if (_logSortCol === col) {
    _logSortDir = _logSortDir === 1 ? -1 : _logSortDir === -1 ? 0 : 1;
  } else {
    _logSortCol = col; _logSortDir = 1;
  }
  // Update header classes
  cols.forEach(c => {
    const th = document.getElementById('th-' + c);
    if (!th) return;
    th.classList.remove('asc', 'desc');
    if (c === _logSortCol) th.classList.add(_logSortDir === 1 ? 'desc' : _logSortDir === -1 ? 'asc' : '');
  });
  // Sort or reset
  if (_logSortDir === 0) {
    allCompletedBets = _logOriginal.slice();
  } else {
    const getVal = (r) => {
      if (col === 'wager')  return parseMoney(r[5]) || 0;
      if (col === 'pct')    return parseFloat(String(r[6]||'').replace(/%/g,'')) || 0;
      if (col === 'payout') {
        const w = parseMoney(r[5]) || 0;
        const p = parseMoney(r[7]) || 0;
        // If payout is 0 (loss), sort by profit (negative) so losses sort among themselves
        return p === 0 ? (p - w) : p;
      }
      return 0;
    };
    allCompletedBets = _logOriginal.slice().sort((a, b) =>
      _logSortDir === 1 ? getVal(b) - getVal(a) : getVal(a) - getVal(b));
  }
  renderLogRows();
}

function toggleExpand(){showAll=!showAll;renderLogRows();}
window.toggleExpand=toggleExpand;

loadData();
</script>
