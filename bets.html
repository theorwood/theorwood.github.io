<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BET LEDGER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0c0e10;
    --surface: #13161a;
    --surface2: #1a1e24;
    --border: #252a32;
    --green: #00e676;
    --red: #ff4444;
    --gold: #f5c842;
    --blue: #4fc3f7;
    --muted: #5a6370;
    --text: #e8eaed;
    --text2: #9aa0ab;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.3;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 40px 16px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 4px;
    background: linear-gradient(90deg, var(--gold), #fff 60%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #load-status {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    animation: pulse 1.5s infinite;
  }
  .dot.live { background: var(--green); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  main { padding: 32px 40px; max-width: 1400px; margin: 0 auto; }

  /* ─── SECTION TITLE ─── */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ─── PENDING STUBS ─── */
  #pending-section { margin-bottom: 40px; }
  #pending-cards {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .pending-card {
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 10px;
    padding: 18px 22px;
    min-width: 220px;
    position: relative;
    overflow: hidden;
    animation: fadeIn .4s ease both;
  }

  .pending-card::before {
    content: 'PENDING';
    position: absolute;
    top: 10px; right: -18px;
    background: var(--gold);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 2px 28px;
    transform: rotate(35deg);
  }

  .pending-card .matchup {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .pending-card .matchup span { color: var(--gold); }

  .pending-card .meta {
    display: flex;
    gap: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text2);
  }

  .pending-card .meta strong { color: var(--text); }

  .pending-card .potential {
    margin-top: 10px;
    font-size: 12px;
    color: var(--green);
    font-family: 'DM Mono', monospace;
  }

  /* ─── BALANCE + CHART ─── */
  #balance-section {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 20px;
    margin-bottom: 40px;
  }

  .balance-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .balance-card .label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .balance-card .amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    line-height: 1;
    letter-spacing: 2px;
  }

  .balance-card .change {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    margin-top: 6px;
  }

  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .neutral { color: var(--text2); }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
  }

  .chart-card canvas { width: 100% !important; }

  /* ─── VENN + STATS ─── */
  #analytics-section {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 20px;
    margin-bottom: 40px;
  }

  .venn-card, .stats-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
  }

  .venn-card h3 {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  #venn-svg { display: block; margin: 0 auto; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .stat-tile {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }

  .stat-tile .st-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .stat-tile .st-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
    line-height: 1;
  }

  .stat-tile .st-sub {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  /* ─── BET LOG ─── */
  #log-section { margin-bottom: 60px; }

  #log-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  #log-table thead tr {
    border-bottom: 1px solid var(--border);
  }

  #log-table th {
    text-align: left;
    padding: 8px 14px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 500;
  }

  #log-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }

  #log-table tbody tr:hover { background: var(--surface2); }

  #log-table td {
    padding: 11px 14px;
    color: var(--text2);
  }

  #log-table td.team { color: var(--text); font-weight: 500; }
  #log-table td.won { color: var(--green); }
  #log-table td.lost { color: var(--red); }
  #log-table td.pending-cell { color: var(--gold); }

  .expand-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    gap: 8px;
    margin-top: 16px;
    padding: 10px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
  }

  .expand-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--muted); }

  .expand-btn svg { transition: transform .3s; }
  .expand-btn.open svg { transform: rotate(180deg); }

  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

  .hidden-rows { display: none; }
  .hidden-rows.show { display: table-row; }

  #no-pending {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    padding: 12px 0;
  }
</style>
</head>
<body>

<header>
  <h1>BET LEDGER</h1>
  <div id="load-status"><div class="dot" id="status-dot"></div><span id="status-text">Loading…</span></div>
</header>

<main>
  <!-- PENDING BETS -->
  <section id="pending-section">
    <div class="section-label">⬤ Live / Pending Bets</div>
    <div id="pending-cards"><p id="no-pending" style="display:none">No pending bets.</p></div>
  </section>

  <!-- BALANCE + CHART -->
  <section id="balance-section">
    <div class="balance-card">
      <div class="label">NET BALANCE</div>
      <div class="amount" id="balance-amount">—</div>
      <div class="change" id="balance-change"></div>
    </div>
    <div class="chart-card">
      <div class="section-label">Balance Over Time</div>
      <canvas id="balance-chart" height="90"></canvas>
    </div>
  </section>

  <!-- VENN + STATS -->
  <section id="analytics-section">
    <div class="venn-card">
      <h3>Win / Loss Distribution</h3>
      <svg id="venn-svg" viewBox="0 0 300 200" width="300" height="200"></svg>
      <div id="venn-legend" style="text-align:center;margin-top:10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2)"></div>
    </div>
    <div class="stats-card">
      <div class="section-label" style="margin-bottom:16px">Performance Stats</div>
      <div class="stats-grid" id="stats-grid"></div>
    </div>
  </section>

  <!-- BET LOG -->
  <section id="log-section">
    <div class="section-label">Bet Log — Recent Completed</div>
    <table id="log-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Bet Team</th>
          <th>Opponent</th>
          <th>Type</th>
          <th>Wager</th>
          <th>Odds</th>
          <th>Payout</th>
          <th>Result</th>
          <th>Profit</th>
        </tr>
      </thead>
      <tbody id="log-body"></tbody>
    </table>
    <button class="expand-btn" id="expand-btn" onclick="toggleExpand()">
      <span id="expand-label">Show All Bets</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcqC9jKaHG8zOS_2-szgNmDE-RaPdrF6M_pfnLWudIe8fuauDeWfKza8DyEdgam_-V2kgrpGdn7R9T/pub?gid=0&single=true&output=csv";

let allCompletedBets = [];
let showAll = false;
let balanceChart = null;

function parseMoney(v) {
  if (!v) return null;
  return parseFloat(String(v).replace(/[$,\s]/g, ''));
}

function betType(team) {
  if (!team) return 'unknown';
  if (/ml/i.test(team)) return 'ML';
  if (/[+-]\d/.test(team)) return 'Spread';
  return 'Other';
}

function isPending(row) {
  const h = String(row[7] || '').trim().toLowerCase();
  return h === 'pending' || h === '';
}

function loadData() {
  Papa.parse(CSV_URL, {
    download: true,
    skipEmptyLines: true,
    complete: (results) => {
      const rows = results.data;
      // Skip header rows (find first row where col C looks like a team/bet)
      const dataRows = rows.filter((r, i) => {
        if (i === 0) return false; // skip header
        return r[2] && r[2].trim() !== '' && r[5] && parseMoney(r[5]) !== null;
      });

      document.getElementById('status-dot').classList.add('live');
      document.getElementById('status-text').textContent = `${dataRows.length} bets loaded`;

      renderPending(dataRows);
      renderBalance(dataRows);
      renderAnalytics(dataRows);
      renderLog(dataRows);
    },
    error: (err) => {
      document.getElementById('status-text').textContent = 'Error loading data';
      console.error(err);
    }
  });
}

// ─── PENDING ───
function renderPending(rows) {
  const container = document.getElementById('pending-cards');
  const noPending = document.getElementById('no-pending');
  const pending = rows.filter(isPending);

  if (pending.length === 0) {
    noPending.style.display = 'block';
    return;
  }

  pending.forEach((r, idx) => {
    const team = r[2] || '?';
    const opp  = r[3] || '?';
    const amt  = parseMoney(r[5]);
    const odds = r[6] || '—';
    const theoretical = parseMoney(r[8]);

    const card = document.createElement('div');
    card.className = 'pending-card';
    card.style.animationDelay = `${idx * 0.08}s`;
    card.innerHTML = `
      <div class="matchup"><span>${team}</span> vs ${opp}</div>
      <div class="meta">
        <div>Wager: <strong>$${amt ? amt.toFixed(2) : '—'}</strong></div>
        <div>Odds: <strong>${odds}</strong></div>
      </div>
      ${theoretical ? `<div class="potential">Potential: +$${theoretical.toFixed(2)}</div>` : ''}
    `;
    container.appendChild(card);
  });
}

// ─── BALANCE + CHART ───
function renderBalance(rows) {
  const completed = rows.filter(r => !isPending(r));

  // Build running balance
  let running = 0;
  const points = [];
  const labels = [];

  completed.forEach((r, i) => {
    const wager  = parseMoney(r[5]) || 0;
    const payout = parseMoney(r[7]) || 0;
    const profit = payout - wager;
    running += profit;
    points.push(parseFloat(running.toFixed(2)));
    labels.push(`Bet ${i + 1}`);
  });

  const totalProfit = running;
  const el = document.getElementById('balance-amount');
  el.textContent = `$${Math.abs(totalProfit).toFixed(2)}`;
  el.className = 'amount ' + (totalProfit >= 0 ? 'positive' : 'negative');

  // Change vs prior bet
  const change = points.length >= 2 ? points[points.length-1] - points[points.length-2] : 0;
  const changeEl = document.getElementById('balance-change');
  changeEl.textContent = change >= 0 ? `▲ +$${change.toFixed(2)} last bet` : `▼ -$${Math.abs(change).toFixed(2)} last bet`;
  changeEl.className = 'change ' + (change >= 0 ? 'positive' : 'negative');

  // Chart
  const ctx = document.getElementById('balance-chart').getContext('2d');
  if (balanceChart) balanceChart.destroy();

  const gradient = ctx.createLinearGradient(0, 0, 0, 200);
  gradient.addColorStop(0, totalProfit >= 0 ? 'rgba(0,230,118,0.25)' : 'rgba(255,68,68,0.25)');
  gradient.addColorStop(1, 'rgba(0,0,0,0)');

  balanceChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: points,
        borderColor: totalProfit >= 0 ? '#00e676' : '#ff4444',
        backgroundColor: gradient,
        borderWidth: 2,
        pointRadius: points.length > 20 ? 0 : 3,
        pointBackgroundColor: totalProfit >= 0 ? '#00e676' : '#ff4444',
        fill: true,
        tension: 0.35,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: '#1a1e24',
        borderColor: '#252a32',
        borderWidth: 1,
        titleColor: '#9aa0ab',
        bodyColor: '#e8eaed',
        callbacks: { label: ctx => `$${ctx.parsed.y.toFixed(2)}` }
      }},
      scales: {
        x: { grid: { color: '#1a1e24' }, ticks: { color: '#5a6370', font: { family: 'DM Mono', size: 10 } } },
        y: {
          grid: { color: '#1a1e24' },
          ticks: { color: '#5a6370', font: { family: 'DM Mono', size: 10 }, callback: v => `$${v}` },
          border: { dash: [4, 4] }
        }
      }
    }
  });
}

// ─── VENN + STATS ───
function renderAnalytics(rows) {
  const completed = rows.filter(r => !isPending(r));
  const wins = completed.filter(r => {
    const payout = parseMoney(r[7]) || 0;
    const wager  = parseMoney(r[5]) || 0;
    return payout > wager;
  });
  const losses = completed.filter(r => {
    const payout = parseMoney(r[7]) || 0;
    const wager  = parseMoney(r[5]) || 0;
    return payout <= wager && payout > 0;
  });
  const pushes = completed.filter(r => parseMoney(r[7]) === parseMoney(r[5]));

  const total = completed.length;
  const winCount = wins.length;
  const lossCount = losses.length;
  const winPct = total > 0 ? ((winCount / total) * 100).toFixed(1) : 0;

  // Draw venn (actually an overlapping circles diagram)
  const svg = document.getElementById('venn-svg');
  const winR = Math.max(20, (winCount / total) * 120);
  const lossR = Math.max(20, (lossCount / total) * 120);
  svg.innerHTML = `
    <circle cx="110" cy="100" r="${winR}" fill="#00e676" fill-opacity="0.18" stroke="#00e676" stroke-opacity="0.6" stroke-width="1.5"/>
    <circle cx="${190}" cy="100" r="${lossR}" fill="#ff4444" fill-opacity="0.18" stroke="#ff4444" stroke-opacity="0.6" stroke-width="1.5"/>
    <text x="90" y="96" text-anchor="middle" font-family="Bebas Neue,sans-serif" font-size="28" fill="#00e676">${winCount}</text>
    <text x="90" y="112" text-anchor="middle" font-family="DM Mono,monospace" font-size="10" fill="#00e676" opacity=".7">WINS</text>
    <text x="210" y="96" text-anchor="middle" font-family="Bebas Neue,sans-serif" font-size="28" fill="#ff4444">${lossCount}</text>
    <text x="210" y="112" text-anchor="middle" font-family="DM Mono,monospace" font-size="10" fill="#ff4444" opacity=".7">LOSSES</text>
    <text x="150" y="185" text-anchor="middle" font-family="DM Mono,monospace" font-size="11" fill="#9aa0ab">${winPct}% WIN RATE</text>
  `;

  // Spreads
  const spreads = completed.filter(r => /[+-]\d/.test(String(r[2] || '')));
  const spreadWins = spreads.filter(r => (parseMoney(r[7]) || 0) > (parseMoney(r[5]) || 0));
  const spreadPct = spreads.length > 0 ? ((spreadWins.length / spreads.length) * 100).toFixed(1) : 'N/A';

  // Moneylines
  const mls = completed.filter(r => /ml/i.test(String(r[2] || '')));
  const mlWins = mls.filter(r => (parseMoney(r[7]) || 0) > (parseMoney(r[5]) || 0));
  const mlPct = mls.length > 0 ? ((mlWins.length / mls.length) * 100).toFixed(1) : 'N/A';

  // Best profit
  let bestProfit = null, bestBet = null;
  let biggestLoss = null, biggestLossBet = null;

  completed.forEach(r => {
    const w = parseMoney(r[5]) || 0;
    const p = parseMoney(r[7]) || 0;
    const profit = p - w;
    if (profit > 0 && (bestProfit === null || profit > bestProfit)) {
      bestProfit = profit; bestBet = r[2];
    }
    if (profit < 0 && (biggestLoss === null || profit < biggestLoss)) {
      biggestLoss = profit; biggestLossBet = r[2];
    }
  });

  // Biggest single wager
  let biggestWager = 0;
  completed.forEach(r => {
    const w = parseMoney(r[5]) || 0;
    if (w > biggestWager) biggestWager = w;
  });

  const grid = document.getElementById('stats-grid');
  grid.innerHTML = '';

  const tiles = [
    { label: 'Win Rate', val: `${winPct}%`, sub: `${winCount}W / ${lossCount}L`, cls: parseFloat(winPct) >= 50 ? 'positive' : 'negative' },
    { label: 'Total Bets', val: total, sub: `${spreads.length} spreads · ${mls.length} ML`, cls: '' },
    { label: 'Spread Win %', val: spreadPct === 'N/A' ? '—' : `${spreadPct}%`, sub: `${spreadWins.length}/${spreads.length} spread bets`, cls: parseFloat(spreadPct) >= 50 ? 'positive' : 'negative' },
    { label: 'ML Win %', val: mlPct === 'N/A' ? '—' : `${mlPct}%`, sub: `${mlWins.length}/${mls.length} ML bets`, cls: parseFloat(mlPct) >= 50 ? 'positive' : 'negative' },
    { label: 'Best Profit', val: bestProfit !== null ? `+$${bestProfit.toFixed(2)}` : '—', sub: bestBet || '', cls: 'positive' },
    { label: 'Biggest Loss', val: biggestLoss !== null ? `-$${Math.abs(biggestLoss).toFixed(2)}` : '—', sub: biggestLossBet || '', cls: 'negative' },
    { label: 'Largest Wager', val: `$${biggestWager.toFixed(2)}`, sub: 'single bet', cls: '' },
    { label: 'Pending', val: rows.filter(isPending).length, sub: 'active bets', cls: 'neutral' },
  ];

  tiles.forEach(t => {
    const div = document.createElement('div');
    div.className = 'stat-tile';
    div.innerHTML = `
      <div class="st-label">${t.label}</div>
      <div class="st-val ${t.cls}">${t.val}</div>
      <div class="st-sub">${t.sub}</div>
    `;
    grid.appendChild(div);
  });
}

// ─── LOG ───
function renderLog(rows) {
  allCompletedBets = rows.filter(r => !isPending(r)).slice().reverse();
  renderLogRows();
}

function renderLogRows() {
  const tbody = document.getElementById('log-body');
  tbody.innerHTML = '';

  const show = showAll ? allCompletedBets : allCompletedBets.slice(0, 5);
  const rest = showAll ? [] : allCompletedBets.slice(5);

  allCompletedBets.forEach((r, absIdx) => {
    if (!showAll && absIdx >= 5) return;
    appendRow(tbody, r, absIdx + 1);
  });

  if (!showAll && allCompletedBets.length > 5) {
    // placeholder hidden rows
  }

  const btn = document.getElementById('expand-btn');
  const lbl = document.getElementById('expand-label');
  if (allCompletedBets.length <= 5) {
    btn.style.display = 'none';
  } else {
    btn.style.display = 'flex';
    lbl.textContent = showAll ? 'Show Less' : `Show All ${allCompletedBets.length} Bets`;
    btn.className = 'expand-btn' + (showAll ? ' open' : '');
  }
}

function appendRow(tbody, r, num) {
  const team   = r[2] || '—';
  const opp    = r[3] || '—';
  const wager  = parseMoney(r[5]);
  const odds   = r[6] || '—';
  const payout = parseMoney(r[7]);
  const type   = betType(team);

  const won = payout !== null && wager !== null && payout > wager;
  const push = payout !== null && wager !== null && payout === wager;
  const profit = (payout !== null && wager !== null) ? payout - wager : null;

  const resultClass = won ? 'won' : (push ? 'neutral' : 'lost');
  const resultLabel = won ? 'WIN' : (push ? 'PUSH' : 'LOSS');

  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${num}</td>
    <td class="team">${team}</td>
    <td>${opp}</td>
    <td>${type}</td>
    <td>$${wager !== null ? wager.toFixed(2) : '—'}</td>
    <td>${odds}</td>
    <td>$${payout !== null ? payout.toFixed(2) : '—'}</td>
    <td class="${resultClass}">${resultLabel}</td>
    <td class="${profit !== null ? (profit >= 0 ? 'positive' : 'negative') : ''}">
      ${profit !== null ? (profit >= 0 ? `+$${profit.toFixed(2)}` : `-$${Math.abs(profit).toFixed(2)}`) : '—'}
    </td>
  `;
  tbody.appendChild(tr);
}

function toggleExpand() {
  showAll = !showAll;
  renderLogRows();
}

window.toggleExpand = toggleExpand;

loadData();
</script>
</body>
</html>
